# toml_features-script.toml

title = "toml_features"
type = "sequence"

# ---------------------------------------------------------------------------
# Section 1 - minimal: template choice + scalar template props (untagged primitives).
# ---------------------------------------------------------------------------

[section_101_minimal]
template = "array_template"

[section_101_minimal.props]
left_label = "5 by 4"
right_label = "4 by 5"

[step_101_minimal]
dialogue = "Two arrays, two labels. Same dots, different shape."
components = ["SceneComponent"]

# ---------------------------------------------------------------------------
# Section 2 - nested Resource props. Tag the OBJECT-typed fields so the importer
# instantiates the right class. Primitives inside stay untagged.
# ---------------------------------------------------------------------------

[section_102_nested]
template = "array_template"

[section_102_nested.props]
left_label = "Rows"
right_label = "Columns"
ArrayProps: left = { ArrayModel: model = { rows = 5, cols = 4 } }
ArrayProps: right = { ArrayModel: model = { rows = 4, cols = 5 } }

[step_102_nested]
dialogue = """
Look at the LEFT array. Count the rows, then the columns.
Multi line test
"""
components = ["PromptComponent"]
prompt_text = "Which array has 5 rows of 4?"

# Step template_step_properties: typed via class-name sub-table. The class tags on
# `multiple_choice` (Resource) and `choices` (typed array of Resource subclass) drive
# importer instantiation; per-element `LabeledChoiceData:` declares the concrete subclass
# (polymorphism: ChoiceData base, LabeledChoiceData child).
[step_102.MultipleChoiceProps]
columns = 2
string[]: answer_ids = ["1"]
MultipleChoiceModel: multiple_choice = { ChoiceData[]: choices = [
  LabeledChoiceData: { id = "1", text = "Yes" },
  LabeledChoiceData: { id = "2", text = "No" },
  LabeledChoiceData: { id = "3", text = "Misconception", mistake = "shape_confusion" }
] }

# Standard severity-keyed remediations (light/medium/heavy). Empty dialogue is fine -
# the IStep just needs to exist for the prompt's _light/_medium/_heavy slots.
[step_102.step_501]
id = "light"
dialogue = "lorem ipsum"

[step_102.step_502]
id = "medium"
dialogue = "lorem ipsum"

[step_102.step_503]
id = "heavy"
dialogue = "lorem ipsum"

# Mistake-keyed remediation: the `id` matches a ChoiceData.mistake string above, so picking
# the "No" choice triggers this step instead of the severity ladder.
[step_102.step_504]
id = "shape_confusion"
dialogue = "Misconception dialogue"

[step_102.correct]
dialogue = "correct"

# ---------------------------------------------------------------------------
# Section 3 - polymorphic Resource props. `left` is GroupProps (a subclass of
# ArrayProps); `right` is plain ArrayProps. The class name in the type tag
# determines which class gets instantiated.
# ---------------------------------------------------------------------------

[section_103_polymorphic]
template = "array_template"

[section_103_polymorphic.props]
left_label = "Group of 3 by 4"
right_label = "Array of 4 by 3"
GroupProps: left = { ArrayModel: model = { rows = 3, cols = 4 }, group_columns = 2 }
ArrayProps: right = { ArrayModel: model = { rows = 4, cols = 3 } }

[step_103_polymorphic]
dialogue = "A group is just an array drawn with extra spacing. Same numbers, different look."

# ---------------------------------------------------------------------------
# Section 4 - existing TOML features (back-compat regression coverage):
# remediation steps via dotted sub-tables, on_correct branch, inline metadata.
# ---------------------------------------------------------------------------

[section_104_remediation]
template = "array_template"

[section_104_remediation.props]
left_label = "Click the larger one"
ArrayProps: left = { ArrayModel: model = { rows = 5, cols = 4 } }
ArrayProps: right = { ArrayModel: model = { rows = 3, cols = 3 } }

[step_104_remediation]
dialogue = "Which array has more dots?"
components = ["PromptComponent"]
prompt_text = "Click on the larger array."

# Remediation/correct children attach via the CANONICAL step key (`step_104`),
# even when the step itself uses a descriptive suffix (`step_104_remediation`).
# The parser auto-creates the intermediate `step_104` dict from these dotted headers;
# the importer pulls children from there via `_canonical_step_key()`.
[step_104.step_501]
dialogue = "Look at how many rows each one has."
id = "light"

[step_104.step_502]
dialogue = "Count the rows AND the columns. The bigger array has more of both."
id = "medium"

[step_104.correct]
dialogue = "Right - 5 by 4 has 20 dots; 3 by 3 has only 9."
metadata = { "sting_id" = "on_correct" }

# ---------------------------------------------------------------------------
# Section 5 - all multiline string forms in one place. Triple-quoted strings
# preserve embedded newlines; an immediate newline after the opening delimiter
# is trimmed (TOML spec). Single-line """...""" is also valid.
# ---------------------------------------------------------------------------

[section_105_multiline]
template = "array_template"

[section_105_multiline.props]
left_label = """First
line"""
right_label = "single-line"

[step_105_multiline]
dialogue = """
This step's dialogue spans multiple lines.

Blank lines stay blank. Leading whitespace in a line is preserved.
The newline immediately after the opening triple-quote is trimmed.
"""
components = ["SceneComponent"]
