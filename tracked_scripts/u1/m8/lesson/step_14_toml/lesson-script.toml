# --- Section: worked_example_expression_visual ---
[section_107_worked_example_expression_visual]
template = "PLACEHOLDER"

[step_122_worked_example_expression_visual]
dialogue = "We've been going from pictures to expressions. Let's flip it around. If I see 2 times 6, what does that MEAN?"
components = ["SceneComponent"]

[step_123_worked_example_expression_visual]
dialogue = "The first number is groups. So 2 groups."

[step_124_worked_example_expression_visual]
dialogue = "The second number is in each group. So 6 in each."

[step_125_worked_example_expression_visual]
dialogue = "The expression tells you what to look for. 2 times 6 MEANS 2 groups with 6 in each."

