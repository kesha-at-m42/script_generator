title = "lesson"
type = "sequence"

# --- Section: transition_warmup_worked_example ---
[section_100_transition_warmup_worked_example]
template = "PLACEHOLDER"

[step_100_transition_warmup_worked_example]
dialogue = "You've been matching expressions to equal groups. Now YOU get to build them, and you'll learn to go the other way too, figuring out what an expression looks like as a picture. Let me show you how building works."
components = ["SceneComponent"]

[step_101_transition_warmup_worked_example]
dialogue = "First, I ask myself: how many groups? Each bag is one group. 1, 2, 3, 4. Four bags. That's 4 groups."

[step_102_transition_warmup_worked_example]
dialogue = "Now I ask: how many in each group? Let me look inside one bag. 1, 2, 3. Three apples. Let me check another..."

[step_103_transition_warmup_worked_example]
dialogue = "Also 3. They're equal groups. Same number in every bag."

[step_104_transition_warmup_worked_example]
dialogue = "So I have 4 groups of 3. Now watch how I build the expression."

[step_105_transition_warmup_worked_example]
dialogue = "The first number is how many groups. I click 4."

[step_106_transition_warmup_worked_example]
dialogue = "The second number is how many in each group. I click 3."

[step_107_transition_warmup_worked_example]
dialogue = "I built 4 times 3. This is called an expression. An expression uses numbers and symbols to show the math. No equal sign. Just the numbers and the times symbol."

# --- Section: student_builds_with_method ---
[section_101_student_builds_with_method]
template = "PLACEHOLDER"

[step_108_student_builds_with_method]
dialogue = "Your turn to build an expression. First question: how many groups do you see? Second question: how many in each group? Now build the expression."
components = ["SceneComponent", "PromptComponent"]

# --- Section: show_pattern_bags_boxes ---
[section_102_show_pattern_bags_boxes]
template = "PLACEHOLDER"

[step_109_show_pattern_bags_boxes]
dialogue = "Look at these two. On the left, bags. On the right, boxes."
components = ["SceneComponent"]

[step_110_show_pattern_bags_boxes]
dialogue = "Different containers. But notice what's the SAME."

[step_111_show_pattern_bags_boxes]
dialogue = "Both show 2 groups."

[step_112_show_pattern_bags_boxes]
dialogue = "Both have 5 in each group."

[step_113_show_pattern_bags_boxes]
dialogue = "Different containers, bags or boxes, but the SAME structure. Both are 2 groups of 5. Both build the same expression: 2 times 5."

[step_114_show_pattern_bags_boxes]
dialogue = "Equal groups work the same way no matter what holds them."

# --- Section: equal_vs_unequal_groups_can ---
[section_103_equal_vs_unequal_groups_can]
template = "PLACEHOLDER"

[step_115_equal_vs_unequal_groups_can]
dialogue = "All of these show bags with items inside. But can I write a multiplication expression for all of them? Remember, multiplication shows EQUAL groups. Select the pictures where every bag has the SAME number inside."
components = ["SceneComponent", "PromptComponent"]

# --- Section: introducing_methods_c_d_tile ---
[section_104_introducing_methods_c_d_tile]
template = "PLACEHOLDER"

[step_116_introducing_methods_c_d_tile]
dialogue = "You've learned that you need equal groups to write multiplication expressions and that equal groups work the same way no matter what holds them. These are important ideas for multiplication."
components = ["SceneComponent"]

[step_117_introducing_methods_c_d_tile]
dialogue = "You've been choosing complete expressions to represent equal groups. Now you'll build them piece by piece using number tiles. Watch."

[step_118_introducing_methods_c_d_tile]
dialogue = "Notice all of the groups are equal. Same questions: How many groups? 5 boxes. That's 5 groups. I need the 5 tile in the first slot."

[step_119_introducing_methods_c_d_tile]
dialogue = "How many in each group? 2 items. I need the 2 tile in the second slot. I built it piece by piece. 5 times 2. Now you try with tiles."

