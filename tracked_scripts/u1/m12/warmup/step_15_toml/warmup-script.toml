title = "warmup"
type = "sequence"

# --- Section: row_expression_recognition ---
[section_100_row_expression_recognition]
template = "array_template"

[step_100_row_expression_recognition]
dialogue = "Here's an array. You got really good at reading these last time. Either by rows or columns, two different expressions. But this array is hiding something in its numbers. Let's see if you can spot it. I'm highlighting the rows. See them going across? There are 2 rows, and each row has 7 dots. Which expression matches what you see?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: product_observation_notice_wonder ---
[section_101_product_observation_notice_wonder]
template = "array_template"

[step_101_product_observation_notice_wonder]
dialogue = "Now check this out. Here's the row expression AND the column expression, both with their products. Look at those two products. What do you notice?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: bridge_to_lesson ---
[section_102_bridge_to_lesson]
template = "array_template"

[step_102_bridge_to_lesson]
dialogue = "Last time, you spotted two expressions with the same product. And you just saw it again with a different array. But here's the big question: does that ALWAYS happen? And if it does, WHY? Let's find out."
components = ["SceneComponent"]
