[section_112_bridge_exit_check]
template = "array_template"

[step_121_bridge_exit_check]
dialogue = "You proved it: when you change the order of the factors, the product stays the same. You used highlighting, rotation, and the turn-around strategy. Let's see what you know."
components = ["SceneComponent"]
