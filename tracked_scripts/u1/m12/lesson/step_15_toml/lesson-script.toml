title = "lesson"
type = "sequence"

# --- Section: worked_example_dual_interpretation ---
[section_100_worked_example_dual_interpretation]
template = "array_template"

[step_100_worked_example_dual_interpretation]
dialogue = "Let's figure out whether those two expressions really do always give the same product. Watch how I test this idea. I see the rows. 3 rows of 5. That's 3 times 5. And the product is 15."
components = ["SceneComponent"]

[step_101_worked_example_dual_interpretation]
dialogue = "Now the columns. 5 columns of 3. That's 5 times 3. And the product is 15. Same product! Same array, same dots. I didn't add anything or take anything away. We just read it a different way."

# --- Section: student_tries_row_column_expressions ---
[section_101_student_tries_row_column_expressions]
template = "array_template"

[step_102_student_tries_row_column_expressions]
dialogue = "Here's a new array. I highlighted the rows. See them going across? How many rows, and how many in each? Build the expression and find the product."
components = ["SceneComponent", "PromptComponent"]

[step_103_student_tries_row_column_expressions]
dialogue = "Now let's switch to columns. Build the column expression and find the product."
components = ["PromptComponent"]

# --- Section: second_array_product_comparison ---
[section_102_second_array_product_comparison]
template = "array_template"

[step_104_second_array_product_comparison]
dialogue = "Another array. Rows are highlighted. Build the row expression and find the product."
components = ["SceneComponent", "PromptComponent"]

[step_105_second_array_product_comparison]
dialogue = "Now columns. Build it."
components = ["PromptComponent"]

[step_106_second_array_product_comparison]
dialogue = "That's three arrays now. Every time, two expressions and the same product. 15 and 15. 20 and 20. 21 and 21."

# --- Section: pattern_observation_is_this_always_true ---
[section_103_pattern_observation_is_this_always_true]
template = "array_template"

[step_107_pattern_observation_is_this_always_true]
dialogue = "Whether by rows or by columns, same product every time. But here's what we need to figure out: is this a coincidence, or does this always happen? And if it always happens, why?"
components = ["SceneComponent"]

[step_108_pattern_observation_is_this_always_true]
dialogue = "So three arrays now. Every time there were two expressions, but the same product. 15 and 15. 20 and 20. 21 and 21. Why do you think both expressions give the same product?"
components = ["PromptComponent"]

[step_109_pattern_observation_is_this_always_true]
dialogue = "But can we prove it even more clearly? Watch this."

# --- Section: worked_example_rotation ---
[section_104_worked_example_rotation]
template = "array_template"

[step_110_worked_example_rotation]
dialogue = "Here's an array showing 3 rows of 6. 3 times 6 equals 18. Now watch what happens when I turn this array."
components = ["SceneComponent"]

[step_111_worked_example_rotation]
dialogue = "I turned it. Look, what were rows are now columns. What were columns are now rows. Now it's 6 rows of 3. 6 times 3 equals 18. Same product."

[step_112_worked_example_rotation]
dialogue = "And here's the important part. Did any dots disappear when I turned it? Did new dots show up? No. Every dot is still there. I just turned the array. Same dots, same total. That's why the product can't change."

# --- Section: predict_rotation_before_animation ---
[section_105_predict_rotation_before_animation]
template = "array_template"

[step_113_predict_rotation_before_animation]
dialogue = "Here's another array. 5 rows of 3. That's 5 × 3, and 5 times 3 is 15. I'm going to rotate this array. Before I do, let's make a prediction. What expression will describe the rows AFTER I turn it?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: predict_rotation_product_confirmation ---
[section_106_predict_rotation_product_confirmation]
template = "array_template"

[step_114_predict_rotation_product_confirmation]
dialogue = "Try this one. 8 rows of 5. 8 times 5 equals 40. If I turn this array, what will the new row expression be?"
components = ["SceneComponent", "PromptComponent"]

[step_115_predict_rotation_product_confirmation]
dialogue = "And will the product change after rotation?"
components = ["PromptComponent"]

# --- Section: consolidation_hybrid_understanding ---
[section_107_consolidation_hybrid_understanding]
template = "array_template"

[step_116_consolidation_hybrid_understanding]
dialogue = "We have two different ways to prove the same thing. Highlighting: you read the same array two ways. Rotation: you turn the array and rows become columns. Either way, same dots, same product. This doesn't just work for these arrays. It works for every array. Any array you can build. The two expressions will always give the same product. Always."
components = ["SceneComponent", "PromptComponent"]

# --- Section: property_naming_vocabulary ---
[section_108_property_naming_vocabulary]
template = "array_template"

[step_117_property_naming_vocabulary]
dialogue = "You proved something important. No matter which array you check, the two paired expressions always give the same product. This shows us that you can multiply the factors in any order and always get the same answer. These are [vocab]turn-around facts[/vocab]. Mathematicians have a name for this. They call it the [vocab]commutative property of multiplication[/vocab]. But the idea is simple. You can change the order of the factors and get the same answer. And here's why this is more than just interesting. It's a strategy, a plan for solving problems. If you know one fact, you already know its [vocab]turn-around fact[/vocab] without doing any extra work."
components = ["SceneComponent"]

# --- Section: worked_example_strategic_use ---
[section_109_worked_example_strategic_use]
template = "array_template"

[step_118_worked_example_strategic_use]
dialogue = "Watch how the strategy works. If I know 4 times 6 is 24, do I need to compute 6 times 4 and skip-count by 4s six times? No, I can multiply in any order. Switch the factors. 6 times 4 is also 24. I didn't compute anything. I used what I already knew. Your turn. You know 7 times 8 is 56. What's 8 times 7? Use the strategy."
components = ["SceneComponent", "PromptComponent"]

# --- Section: equivalence_discrimination_rotation ---
[section_110_equivalence_discrimination_rotation]
template = "array_template"

[step_119_equivalence_discrimination_rotation]
dialogue = "Here's an array: 3 rows of 8. That's 24 dots. Now look at these four arrays. They ALL have 24 dots. But which one is the SAME array as 3 × 8, just rotated?"
components = ["SceneComponent", "PromptComponent"]

