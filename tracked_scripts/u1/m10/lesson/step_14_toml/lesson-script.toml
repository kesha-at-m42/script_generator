# --- Section: quick_equation_build_setup_sign ---
[section_100_quick_equation_build_setup_sign]
template = "PLACEHOLDER"

[step_100_quick_equation_build_setup_sign]
dialogue = "You know how to do this. Build the equation shown by the picture."
components = ["SceneComponent", "PromptComponent"]

# --- Section: sign_teaching_reversed_orientation_worked ---
[section_101_sign_teaching_reversed_orientation_worked]
template = "PLACEHOLDER"

[step_101_sign_teaching_reversed_orientation_worked]
dialogue = "See this sign right here? The equals sign. Here's something important about it."
components = ["SceneComponent"]

[step_102_sign_teaching_reversed_orientation_worked]
dialogue = "It means SAME VALUE AS. 3 times 4 has the same value as 12. Not the answer is. Equals means same value."

[step_103_sign_teaching_reversed_orientation_worked]
dialogue = "And since both sides have the same value, we can flip them around. 12 equals 3 times 4. Same equation. Same value on both sides. Just written differently."

[step_104_sign_teaching_reversed_orientation_worked]
dialogue = "Both of these are correct. The equals sign works both ways, because it means same value as."

[step_105_sign_teaching_reversed_orientation_worked]
dialogue = "Your turn. Build the equation for these boxes."
components = ["PromptComponent"]

[step_106_sign_teaching_reversed_orientation_worked]
dialogue = "And we can also write it this way. Same value, both sides."

[step_107_sign_teaching_reversed_orientation_worked]
dialogue = "Same idea. Count the bags, count what's inside, figure out the product. Build the equation."
components = ["PromptComponent"]

[step_108_sign_teaching_reversed_orientation_worked]
dialogue = "Both ways work."

# --- Section: guided_practice_reversed_form ---
[section_102_guided_practice_reversed_form]
template = "PLACEHOLDER"

[step_109_guided_practice_reversed_form]
dialogue = "Here's something different. The template is flipped. Product comes first this time. Remember, equals means same value as, so the product can go on either side. Build this equation with the product first."
components = ["SceneComponent", "PromptComponent"]

# --- Section: independent_practice_standard_reversed ---
[section_103_independent_practice_standard_reversed]
template = "PLACEHOLDER"

[step_110_independent_practice_standard_reversed]
dialogue = "One more with bags. Build the equation."
components = ["SceneComponent", "PromptComponent"]

[step_111_independent_practice_standard_reversed]
dialogue = "And we can write it this way too. Same value."

# --- Section: context_variety_announcement_worked_example ---
[section_104_context_variety_announcement_worked_example]
template = "PLACEHOLDER"

[step_112_context_variety_announcement_worked_example]
dialogue = "Equal groups don't just come in bags and boxes. They're everywhere. Rows of books. Stacks of plates. Groups of animals. The math works the same way."
components = ["SceneComponent"]

[step_113_context_variety_announcement_worked_example]
dialogue = "Look at these shelves. I see rows of books. Each row is a group, just like each bag was a group. 1, 2, 3. Three rows. That's 3 groups. And in each row?"

[step_114_context_variety_announcement_worked_example]
dialogue = "1, 2, 3, 4, 5, 6, 7, 8, 9. Nine books. So I've got 3 rows of 9. Same pattern: groups of items."

[step_115_context_variety_announcement_worked_example]
dialogue = "3 times 9. And the product? Skip count by 9s: 9, 18, 27. 3 times 9 equals 27. Same equation building, different picture."

[step_116_context_variety_announcement_worked_example]
dialogue = "Both ways, same value."

# --- Section: equal_vs_unequal_groups_identification ---
[section_105_equal_vs_unequal_groups_identification]
template = "PLACEHOLDER"

[step_117_equal_vs_unequal_groups_identification]
dialogue = "Equal groups are everywhere, but not every group of things is an equal group. Look at these four pictures. Each picture has 18 items in total. Which ones show equal groups, the same number in every group?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: product_unknown_standard_form ---
[section_106_product_unknown_standard_form]
template = "PLACEHOLDER"

[step_118_product_unknown_standard_form]
dialogue = "8 stacks of 4 plates. These are equal groups so we can write a multiplication equation to represent the picture. The expression part is done. 8 times 4. But see that box where the product goes? That's the unknown. The number we need to figure out. Find the total and place it."
components = ["SceneComponent", "PromptComponent"]

# --- Section: product_unknown_reversed_form ---
[section_107_product_unknown_reversed_form]
template = "PLACEHOLDER"

[step_119_product_unknown_reversed_form]
dialogue = "Look at this field. See the sheep? They're grouped together equally. 5 groups, 7 in each. The equation is flipped. Unknown first this time. But equals still means same value as. Figure out the product and place it."
components = ["SceneComponent", "PromptComponent"]

# --- Section: independent_new_context_product_unknown ---
[section_108_independent_new_context_product_unknown]
template = "PLACEHOLDER"

[step_120_independent_new_context_product_unknown]
dialogue = "New context, same pattern of equal groups. 2 shelves of 8 jars. Find the product."
components = ["SceneComponent", "PromptComponent"]

# --- Section: first_factor_unknown_skip_counting ---
[section_109_first_factor_unknown_skip_counting]
template = "PLACEHOLDER"

[step_121_first_factor_unknown_skip_counting]
dialogue = "Here's the new unknown. I know there are 5 birds in each group. And I know the total is 20 birds. But I don't know how many groups. That's the unknown."
components = ["SceneComponent"]

[step_122_first_factor_unknown_skip_counting]
dialogue = "Let me read the sentence: HOW MANY groups of 5 equals 20 total? I need to figure out how many groups of 5 make 20."

[step_123_first_factor_unknown_skip_counting]
dialogue = "I can skip-count by 5s. I know how to do that. Watch: 5..."

[step_124_first_factor_unknown_skip_counting]
dialogue = "...10..."

[step_125_first_factor_unknown_skip_counting]
dialogue = "...15..."

[step_126_first_factor_unknown_skip_counting]
dialogue = "...20. I'm at 20!"

[step_127_first_factor_unknown_skip_counting]
dialogue = "I counted 4 times. That means 4 groups. 4 groups of 5 equals 20."

[step_128_first_factor_unknown_skip_counting]
dialogue = "The unknown was 4. I used skip-counting, something I already know, to figure out how many groups."

# --- Section: first_factor_unknown_student_constructs ---
[section_110_first_factor_unknown_student_constructs]
template = "PLACEHOLDER"

[step_129_first_factor_unknown_student_constructs]
dialogue = "Now you try. Groups of 10. Total is 40. How many groups do you need? Build groups until you hit 40."
components = ["SceneComponent", "PromptComponent"]

[step_130_first_factor_unknown_student_constructs]
dialogue = "4 groups of 10 equals 40. You skip counted, 10, 20, 30, 40, and it took 4 groups."

[step_131_first_factor_unknown_student_constructs]
dialogue = "Here's the equation. 2 groups of how many cats equals 10. We need to build the groups. Let's add equal items to the 2 groups until you reach 10. Add 5 to each group so the total reaches 10."
components = ["PromptComponent"]

[step_132_first_factor_unknown_student_constructs]
dialogue = "2 times 5 equals 10. You started with the equation and built the answer. Now we can skip count by 5s two times: 5, 10. That's the total of 10. Each side of the equation has the same value."

[step_133_first_factor_unknown_student_constructs]
dialogue = "Your turn with a different one. 2 groups, 14 total. 2 times what equals 14?"
components = ["PromptComponent"]

[step_134_first_factor_unknown_student_constructs]
dialogue = "2 times 7 equals 14. 2 groups of 7 is 14. You built the answer."

