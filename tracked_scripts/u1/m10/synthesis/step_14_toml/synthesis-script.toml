[step_101_sign_truth_check]
dialogue = "Four equations. Three are true — both sides have the same value. One is false. Which one is false?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: context_variety_same_structure ---
[section_102_context_variety_same_structure]
template = "PLACEHOLDER"

[step_102_context_variety_same_structure]
dialogue = "Three pictures. One equation fits all of them. What makes them the same?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: unknown_position_flexibility ---
[section_103_unknown_position_flexibility]
template = "PLACEHOLDER"

[step_103_unknown_position_flexibility]
dialogue = "Three equations. Same numbers: 4, 5, and 20. But the unknown moved to a different spot each time. What stays the same?"
components = ["SceneComponent", "PromptComponent"]

[step_104_unknown_position_flexibility]
dialogue = "The unknown moves, but the relationship stays: 4 groups of 5 is always 20. You figure out whichever piece is missing."

# --- Section: m9_m10_growth ---
[section_104_m9_m10_growth]
template = "PLACEHOLDER"

[step_105_m9_m10_growth]
dialogue = "Here's an equation you have seen before. And here's one from today. What changed?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: key_takeaway ---
[section_105_key_takeaway]
template = "PLACEHOLDER"

[step_106_key_takeaway]
dialogue = "If you had to remember one thing from today, what would it be?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: identity_building_closure_m11_bridge ---
[section_106_identity_building_closure_m11_bridge]
template = "PLACEHOLDER"

[step_107_identity_building_closure_m11_bridge]
dialogue = "You came in knowing expressions and products. Now you write complete equations. You know the equals sign means same value as. You find unknowns in any position. And you see equal groups everywhere: bags, rows, stacks, groups."
components = ["SceneComponent"]

[step_108_identity_building_closure_m11_bridge]
dialogue = "Next time, you'll see equal groups arranged in a new way."

[step_109_identity_building_closure_m11_bridge]
dialogue = "Rows AND columns. You'll have a lot to notice."
