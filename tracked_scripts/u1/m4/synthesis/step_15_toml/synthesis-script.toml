title = "synthesis"
type = "sequence"

# --- Section: opening_frame ---
[section_100_opening_frame]
template = "PLACEHOLDER"

[step_100_opening_frame]
dialogue = "You read and created bar graphs with scale of 10. You figured out values at the lines AND between the lines. Let's look at some patterns you discovered."
components = ["SceneComponent"]

# --- Section: scale_progression_pattern_type_pattern ---
[section_101_scale_progression_pattern_type_pattern]
template = "PLACEHOLDER"

[step_101_scale_progression_pattern_type_pattern]
dialogue = "Look at all four graphs. They show the same amount: 20. Which scale uses the fewest lines to show the same amount?"
components = ["SceneComponent", "PromptComponent"]

[step_102_scale_progression_pattern_type_pattern]
dialogue = "You've learned four scales now: 1, 2, 5, and 10. Each one is useful for different sized numbers. Bigger numbers work better with bigger scales."

# --- Section: orientation_transfer_type_d_representation ---
[section_102_orientation_transfer_type_d_representation]
template = "PLACEHOLDER"

[step_103_orientation_transfer_type_d_representation]
dialogue = "Here's the same data shown two ways, vertical and horizontal. Find the category with 35 in BOTH graphs."
components = ["SceneComponent", "PromptComponent"]

[step_104_orientation_transfer_type_d_representation]
dialogue = "Now find 35 in the horizontal graph."
components = ["PromptComponent"]

# --- Section: real_world_connection_type_c ---
[section_103_real_world_connection_type_c]
template = "PLACEHOLDER"

[step_105_real_world_connection_type_c]
dialogue = "Scale of 10 is useful when numbers are bigger. Where might you see counting by 10s outside of math class?"
components = ["SceneComponent", "PromptComponent"]

[step_106_real_world_connection_type_c]
dialogue = "You already know how to count by 10s. Bar graphs use the same skill you use with money and measuring."

# --- Section: metacognitive_reflection_strategy_identification ---
[section_104_metacognitive_reflection_strategy_identification]
template = "PLACEHOLDER"

[step_107_metacognitive_reflection_strategy_identification]
dialogue = "This bar shows 45, between the lines. How did you figure that out during the lesson?"
components = ["SceneComponent", "PromptComponent"]

[step_108_metacognitive_reflection_strategy_identification]
dialogue = "Knowing that pattern means you can read any bar graph with scale of 10, even values between the lines. That's a powerful strategy."

[step_109_metacognitive_reflection_strategy_identification]
dialogue = "You learned to read values at the lines and between the lines. You used 'half of 10 is 5' to figure out tricky values."

[step_110_metacognitive_reflection_strategy_identification]
dialogue = "That pattern-finding will help you when we look at all the scales together next time. You'll be able to pick the best one for any data."
