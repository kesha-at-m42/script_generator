components = ["SceneComponent"]

[step_106_skip_counting_connection]
dialogue = "You already know how to count by 10s. That's exactly what we do with scale of 10. The fourth bar shows Yellow. Count by 10s. What value does the bar show?"
components = ["PromptComponent"]

