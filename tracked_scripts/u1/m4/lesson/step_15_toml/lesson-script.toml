# ---------------------------------------------------------------------------

[section_107_discovering_between_lines_worked_example]
template = "chart_template"

[step_111_discovering_between_lines_worked_example]
dialogue = "You can read bars that end right at the lines. But what if a bar ends BETWEEN the lines? Here is data showing the number of stickers collected by some students. Look at Jake's bar. It doesn't end at a line. It ends BETWEEN the lines."

[step_112_discovering_between_lines_worked_example]
dialogue = "Remember half-symbols from scale of 2? Half of 2 was 1. Same idea here. But what is half of 10?"

[step_113_discovering_between_lines_worked_example]
dialogue = "Half of 10 is 5. Jake’s bar is between 20 and 30. We take 20 and add 5, which equals 25. So Jake has 25 stickers, exactly halfway between 20 and 30."

