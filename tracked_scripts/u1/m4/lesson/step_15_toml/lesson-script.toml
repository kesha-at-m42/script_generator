# ---------------------------------------------------------------------------
# Section 1 - reading_bar_heights_worked_example
# ---------------------------------------------------------------------------

[section_101_reading_bar_heights_worked_example]
template = "chart_template"

[step_101_reading_bar_heights_worked_example]
dialogue = "\"This is the same bar graph. Now let's learn how to read it exactly."
components = ["SceneComponent"]

[step_102_reading_bar_heights_worked_example]
dialogue = "See these numbers along the side? They show the scale on the [vocab]axis[/vocab]. 10, 20, 30, 40. That's counting by 10s. This graph shows scale of 10."

[step_103_reading_bar_heights_worked_example]
dialogue = "Red has 40. The [vocab]height of the bar[/vocab] ends at the 40 line."

[step_104_reading_bar_heights_worked_example]
dialogue = "I can count by 10s to check: 10, 20, 30, 40. You already know how to count by 10s."

# ---------------------------------------------------------------------------
# Section 2 - reading_bar_height
# ---------------------------------------------------------------------------

[section_102_reading_bar_height]
template = "chart_template"

[step_105_reading_bar_height]
dialogue = "Look at Blue. The [vocab]bar's height[/vocab] ends at a line on the [vocab]axis[/vocab]. What value does this show?"
components = ["PromptComponent"]
prompt_text = "What value does the Blue bar show?"

[step_105.correct]
dialogue = "Right. 30. The bar ends at the 30 line. Same as 3 symbols on the picture graph. Each symbol shows 10."
metadata = { sting_id = "on_correct" }

[step_105.step_502]
dialogue = "That’s the number of symbols on the picture graph or the number of marks on the axis. To include the scale, we read the values on axis of a bar graph. What number do you see where the top of the Blue bar ends?"
id = "3"

[step_105.step_503]
dialogue = "Follow the top of the Blue bar across to the axis. It doesn’t end at 20. Count the lines along the axis."
id = "20"

[step_105.step_504]
dialogue = "The bar ends exactly at a line. Follow it across. Read the value on the axis."
id = "35"

[step_105.step_505]
dialogue = "Let me show you the process. I follow the top of the Blue bar across to the axis. It ends right at the 30 line. That's counting by 10s: 10, 20, 30. The bar shows 30 votes for Blue. That's how we read bar heights."
id = "heavy"

