[step_107.step_507]
dialogue = "That is the number of ticks or number of jumps by 10, but we need the value of the Yellow bar. Look at where the bar ends on the axis. Use the numbers on the side to find the height of the bar."
id = "2"

[step_107.step_508]
dialogue = "That’s not it. The scale goes by 10s so count by 10s along the marks on the axis. Where does the Yellow bar end?"
id = "12"

[step_107.step_509]
dialogue = "Look closely at where the bar ends. It's right at a line that you can reach counting by 10s. Find the number at the height of the Yellow bar."
id = "25"

[step_107.step_510]
dialogue = "Let’s go through the process. I find the Yellow bar and follow the top over to the axis. I count by 10s up the axis until I reach that point: 10, 20. The Yellow bar ends right at the 20 line. So the bar shows 20. Two jumps of 10. That's how the scale works."
id = "heavy"

