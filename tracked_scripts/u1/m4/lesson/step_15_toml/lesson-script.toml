components = ["SceneComponent"]

# --- Section: discovering_between_lines_worked_example ---
[section_107_discovering_between_lines_worked_example]
template = "PLACEHOLDER"

[step_111_discovering_between_lines_worked_example]
dialogue = "Look at Jake's bar. It doesn't end at a line. It ends between the lines."
components = ["SceneComponent"]

[step_112_discovering_between_lines_worked_example]
dialogue = "Remember half-symbols from scale of 2? Half of 2 was 1. Same idea here. Half of 10 is 5."

[step_113_discovering_between_lines_worked_example]
dialogue = "Half of 10 is 5. So between 20 and 30, that's 20 + 5 = 25. Jake has 25 stickers."

