# --- Section: reading_bar_heights_worked_example ---
[section_100_reading_bar_heights_worked_example]
template = "PLACEHOLDER"

[step_100_reading_bar_heights_worked_example]
dialogue = "You saw this bar graph in Warmup. Now let's learn how to read it exactly."
components = ["SceneComponent"]

[step_101_reading_bar_heights_worked_example]
dialogue = "See these numbers along the side? They show the scale. 10, 20, 30, 40. That's counting by 10s!"

[step_102_reading_bar_heights_worked_example]
dialogue = "Red has 40. The height of the bar ends at the 40 line."

[step_103_reading_bar_heights_worked_example]
dialogue = "I can count by 10s to check: 10, 20, 30, 40. You already know how to count by 10s!"

# --- Section: reading_bar_height ---
[section_101_reading_bar_height]
template = "PLACEHOLDER"

[step_104_reading_bar_height]
