# exitcheck-script.toml

title = "exitcheck"
type = "sequence"

# ---------------------------------------------------------------------------
# Section 1 - transition_into_exit_check
# ---------------------------------------------------------------------------

[section_101_transition_into_exit_check]
template = "chart_template"

[step_101_transition_into_exit_check]
dialogue = "You made bar graphs with scale of 10. You read values at the lines and between the lines. Let's see what you know."
components = ["SceneComponent"]

# ---------------------------------------------------------------------------
# Section 2 - read_value_at_axis_line
# ---------------------------------------------------------------------------

[section_102_read_value_at_axis_line]
template = "chart_template"

[step_102_read_value_at_axis_line]
dialogue = "This graph shows the number of books checked out based on genre. Look at the Fiction bar. What value does the Fiction bar show?"
components = ["PromptComponent"]
prompt_text = "What value does the Fiction bar show?"

# ---------------------------------------------------------------------------
# Section 3 - read_value_between_lines_interpolation
# ---------------------------------------------------------------------------

[section_103_read_value_between_lines_interpolation]
template = "chart_template"

[step_103_read_value_between_lines_interpolation]
dialogue = "Check out the number of points earned by these teams. Look at Team A's bar. It ends between the lines. What value does this show?"
components = ["PromptComponent"]
prompt_text = "What is the value represented for Team A?"

# ---------------------------------------------------------------------------
# Section 4 - create_bar_graph_with_mixed
# ---------------------------------------------------------------------------

[section_104_create_bar_graph_with_mixed]
template = "chart_template"

[step_104_create_bar_graph_with_mixed]
dialogue = "Use the data table showing Art Supplies Collected to create the bar graph. Some values are at the lines, some are between."
components = ["PromptComponent"]
prompt_text = "Complete the bar graph."

# ---------------------------------------------------------------------------
# Section 5 - comparison_problem_compare
# ---------------------------------------------------------------------------

[section_105_comparison_problem_compare]
template = "chart_template"

[step_105_comparison_problem_compare]
dialogue = "Use the graph you made. How many more Glue Sticks were collected than Markers?"
components = ["PromptComponent"]
prompt_text = "How many more Glue Sticks were collected than Markers?"

# ---------------------------------------------------------------------------
# Section 6 - exit_check_closure
# ---------------------------------------------------------------------------

[section_106_exit_check_closure]
template = "chart_template"

[step_106_exit_check_closure]
dialogue = "You can read bar graphs with a scale of 10, even values between the lines and answer questions about them. You're ready to practice."
