title = "warmup"
type = "sequence"

# --- Section: data_collection_game ---
[section_100_data_collection_game]
template = "PLACEHOLDER"

[step_100_data_collection_game]
dialogue = "The Minis are collecting items! Help count what they found. You counted the items. That's a lot! Let's see how to show this data."
components = ["SceneComponent"]

# --- Section: scale_comparison_1_5_vs ---
[section_101_scale_comparison_1_5_vs]
template = "PLACEHOLDER"

[step_101_scale_comparison_1_5_vs]
dialogue = "Here's your data two ways. Look at both graphs. Which graph uses fewer symbols to show the same data?"
components = ["SceneComponent", "PromptComponent"]

[step_102_scale_comparison_1_5_vs]
dialogue = "With scale of 10, each symbol shows more than scale of 5. That's why you need fewer symbols for the same data."

# --- Section: picture_bar_bridge_1_10 ---
[section_102_picture_bar_bridge_1_10]
template = "PLACEHOLDER"

[step_103_picture_bar_bridge_1_10]
dialogue = "Now watch this. Here's the SAME data as a bar graph."
components = ["SceneComponent"]

[step_104_picture_bar_bridge_1_10]
dialogue = "This category has 40. The picture graph shows 4 symbols. The bar graph shows a bar up to 40. Both graphs show 50 for Birds. Can you find where?"
components = ["PromptComponent", "PromptComponent"]

[step_105_picture_bar_bridge_1_10]
dialogue = "Bar graphs are really useful with scale of 10. You read the HEIGHT instead of counting symbols."

# --- Section: bridge_lesson ---
[section_103_bridge_lesson]
template = "PLACEHOLDER"

[step_106_bridge_lesson]
dialogue = "You've seen scale of 10 with picture graphs and bar graphs. Both show the same data."
components = ["SceneComponent"]

[step_107_bridge_lesson]
dialogue = "Bar graphs are powerful. You can read exact amounts from the numbers on the side."

[step_108_bridge_lesson]
dialogue = "Ready to learn how to create bar graphs with scale of 10? Let's go."
