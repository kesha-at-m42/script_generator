# --- Section: bridge_exit_check ---
[section_113_bridge_exit_check]
template = "PLACEHOLDER"

[step_140_bridge_exit_check]
dialogue = "You learned to choose scales. Check the biggest number. Does it fit without too many marks on the axis? Check the ones place digits. Are they 0 or 5 to find the exact place for the bar? For very small data, scale of 1 could work. Then pick the easiest to read."
components = ["SceneComponent"]

[step_141_bridge_exit_check]
dialogue = "Let's see what you know."
