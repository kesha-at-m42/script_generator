title = "lesson"
type = "sequence"

# --- Section: transition_warmup ---
[section_100_transition_warmup]
template = "PLACEHOLDER"

[step_100_transition_warmup]
dialogue = "In Warmup, all four scales worked for your data. You had options!"
components = ["SceneComponent"]

[step_101_transition_warmup]
dialogue = "But what happens when the numbers are bigger? Let's find out."

# --- Section: when_scale_needs_too_many ---
[section_101_when_scale_needs_too_many]
template = "PLACEHOLDER"

[step_102_when_scale_needs_too_many]
dialogue = "Here's data about how many books four students read this month. Dana read the most—80 books!"
components = ["SceneComponent"]

[step_103_when_scale_needs_too_many]
dialogue = "Let me try a scale of 5 and see what happens."

[step_104_when_scale_needs_too_many]
dialogue = "Hmm. Carlos's bar is just above my graph, but Dana's bar goes past the top. The graph only goes up to 50 right now."

[step_105_when_scale_needs_too_many]
dialogue = "I could make the graph taller to fit 80. Let's see... I'd need 55, 60, 65, 70, 75, 80..."

[step_106_when_scale_needs_too_many]
dialogue = "That's a lot of numbers on the axis. 0, 5, 10, 15, 20... all the way up to 80. That's 17 tick marks."

[step_107_when_scale_needs_too_many]
dialogue = "It works, but is there a better way? When one scale needs too many tick marks, try a bigger scale."

# --- Section: trying_bigger_scale ---
[section_102_trying_bigger_scale]
template = "PLACEHOLDER"

[step_108_trying_bigger_scale]
dialogue = "Scale of 5 works, but that's a lot of tick marks. Let's try a bigger scale."
components = ["SceneComponent", "PromptComponent"]

# --- Section: range_check_efficiency ---
[section_103_range_check_efficiency]
template = "PLACEHOLDER"

[step_109_range_check_efficiency]
dialogue = "Here's the first thing to check: What's your biggest number? That tells you what scales might work."
components = ["SceneComponent", "PromptComponent"]

[step_110_range_check_efficiency]
dialogue = "You saw that Scale of 5 needed 17 tick marks. Scale of 10 only needs 9. For big data, bigger scales make cleaner graphs. When more than one scale fits, pick the one that's easier to read."

# --- Section: all_scales_fit_small_data ---
[section_104_all_scales_fit_small_data]
template = "PLACEHOLDER"

[step_111_all_scales_fit_small_data]
dialogue = "Here's data about marbles. Look at the biggest number: 23. That's pretty small!"
components = ["SceneComponent"]

[step_112_all_scales_fit_small_data]
dialogue = "This graph is horizontal. The bars go sideways. Let's check: which scales fit? Try clicking each scale."
components = ["PromptComponent"]

[step_113_all_scales_fit_small_data]
dialogue = "Let's look at Scale of 1."
components = ["PromptComponent"]

# --- Section: but_which_is_best_efficiency ---
[section_105_but_which_is_best_efficiency]
template = "PLACEHOLDER"

[step_114_but_which_is_best_efficiency]
dialogue = "Scale of 1 works, but that's a lot of lines. You learned bigger scales are usually easier to read. Let's try Scale of 10."
components = ["SceneComponent", "PromptComponent"]

[step_115_but_which_is_best_efficiency]
dialogue = "Hmm. Scale of 10 fits, but there are only 3 marks on the axis. Look at those warnings. Can you tell the exact value of where those bars end? Someone looking at our graph without the data table would need to guess how many marbles are shown. For big data, we'd pick Scale of 10 anyway. It's the easiest to read because we don't want too many lines on the axis. But these numbers are small and it's hard to find the exact location of the bar on the graph. We can do better. When data is small, you have room to find a scale where everything lands exactly."

# --- Section: scale_2_works_non_multiples ---
[section_106_scale_2_works_non_multiples]
template = "PLACEHOLDER"

[step_116_scale_2_works_non_multiples]
dialogue = "Let's try a smaller scale. Try a Scale of 2."
components = ["SceneComponent", "PromptComponent"]

[step_117_scale_2_works_non_multiples]
dialogue = "With Scale of 2, half of 2 is 1. So you can show any whole number exactly. Scale of 2 works to show the exact value for all numbers, and for small data, the graph won't have too many marks on the axis."

# --- Section: digit_pattern_recognition_shortcut ---
[section_107_digit_pattern_recognition_shortcut]
template = "PLACEHOLDER"

[step_118_digit_pattern_recognition_shortcut]
dialogue = "Here's a quick way to know if you need Scale of 2. Check the last digit of each number in the ones place. Numbers that end in 0 or 5, like 20, 35, 55, 80, those are multiples of 5 and can be shown clearly with Scales of 5 and 10. But look at 7, 12, 19, 23. See the digits in the ones place? 7, 2, 9, 3. None are 0 or 5. That tells you they aren't multiples of 5 so Scale of 2 might be your best choice. Check our groups. Which data set has last digits that are NOT 0 or 5?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: practice_with_non_multiples ---
[section_108_practice_with_non_multiples]
template = "PLACEHOLDER"

[step_119_practice_with_non_multiples]
dialogue = "Here's data from a game. Four rounds of points: 22, 15, 8, 31."
components = ["SceneComponent"]

[step_120_practice_with_non_multiples]
dialogue = "Check the ones place digits: 2, 5, 8, 1. Do they all end in 0 or 5?"

[step_121_practice_with_non_multiples]
dialogue = "22... no. 15... yes. 8... no. 31... no. Three of them don't, so they aren't multiples of 5. Which scale will show all values exactly?"
components = ["PromptComponent"]

[step_122_practice_with_non_multiples]
dialogue = "Scale of 1 also shows the exact values, but it would require a lot of marks on the axis to get to the greatest value of 31. Let's consider when we might choose a scale of 1."

# --- Section: very_small_data_scale_1 ---
[section_109_very_small_data_scale_1]
template = "PLACEHOLDER"

[step_123_very_small_data_scale_1]
dialogue = "Look at these numbers: 9, 5, 7, 3. They're really small."
components = ["SceneComponent"]

[step_124_very_small_data_scale_1]
dialogue = "What happens if we try Scale of 10? Click Scale of 10."
components = ["PromptComponent"]

[step_125_very_small_data_scale_1]
dialogue = "Think about the numbers: 9, 5, 7, 3. They don't end in 0 or 5, so we know Scale of 2 is clearer to show any number. Click Scale of 2."
components = ["PromptComponent"]

[step_126_very_small_data_scale_1]
dialogue = "But when numbers are this small, you have another option. Try Scale of 1. What do you notice? Click Scale of 1."
components = ["PromptComponent"]

# --- Section: independent_selection_multiples_5 ---
[section_110_independent_selection_multiples_5]
template = "PLACEHOLDER"

[step_127_independent_selection_multiples_5]
dialogue = "Here's data about students' favorite fruits. The most votes went to Dates with 60. Scale of 1 doesn't make sense here because it would take 60 lines on the axis. That's too much!"
