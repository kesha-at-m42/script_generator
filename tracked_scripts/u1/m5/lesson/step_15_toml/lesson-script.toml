[section_111_selection_creation_non_multiples]
template = "PLACEHOLDER"

[step_130_selection_creation_non_multiples]
dialogue = "Here's data about how many minutes students practiced their instruments."
components = ["SceneComponent"]

[step_131_selection_creation_non_multiples]
dialogue = "Check: are these numbers multiples of 5? Which scale is best for this data?"
components = ["PromptComponent"]

[step_132_selection_creation_non_multiples]
