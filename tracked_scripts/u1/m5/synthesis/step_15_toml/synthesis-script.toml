# --- Section: opening_frame ---
[section_100_opening_frame]
template = "PLACEHOLDER"

[step_100_opening_frame]
dialogue = "You learned to choose scales. You checked if the biggest number fits. You checked the last digits. Now let's connect what you discovered."
components = ["SceneComponent"]

# --- Section: decision_checklist_consolidation_type_b ---
[section_101_decision_checklist_consolidation_type_b]
template = "PLACEHOLDER"

[step_101_decision_checklist_consolidation_type_b]
dialogue = "Here's the first question you learned: Does the biggest number fit? Dan scored 80. That's too big for Scale of 5. You'd need a bigger scale."
components = ["SceneComponent"]

[step_102_decision_checklist_consolidation_type_b]
dialogue = "Here's the second question: Do all the numbers end in 0 or 5? 7, 12, 19, 23. None of them end in 0 or 5. Scale of 2 is the only one that works exactly. When you look at new data, which question do you check first?"
components = ["PromptComponent"]

# --- Section: scale_strengths_type_pattern_discovery ---
[section_102_scale_strengths_type_pattern_discovery]
template = "PLACEHOLDER"

[step_103_scale_strengths_type_pattern_discovery]
dialogue = "Here's the same data shown four different ways. Look at the differences."
components = ["SceneComponent"]

[step_104_scale_strengths_type_pattern_discovery]
dialogue = "Scale of 1 has the most lines. Scale of 10 has the fewest. All four show the same information. Which graph is easiest to read?"
components = ["PromptComponent"]

[step_105_scale_strengths_type_pattern_discovery]
dialogue = "Scale of 1 and 2 are for smaller data. They show every number exactly. Scale of 5 and 10 are for bigger data. They're cleaner and easier to read."

# --- Section: real_world_connection_type_c ---
[section_103_real_world_connection_type_c]
template = "PLACEHOLDER"

[step_106_real_world_connection_type_c]
dialogue = "People collect data about all kinds of things. Look at these three tables. Which data would have to use Scale of 2?"
components = ["SceneComponent", "PromptComponent"]

[step_107_real_world_connection_type_c]
dialogue = "Here's a quick check: Do all the numbers end in 0 or 5? If yes, you have options. If no and the numbers are small, Scale of 2 is your go-to."

# --- Section: metacognitive_reflection_type_1_strategy ---
[section_104_metacognitive_reflection_type_1_strategy]
template = "PLACEHOLDER"

[step_108_metacognitive_reflection_type_1_strategy]
dialogue = "What helped you most when deciding which scale to use?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: identity_building_closure ---
[section_105_identity_building_closure]
template = "PLACEHOLDER"

[step_109_identity_building_closure]
dialogue = "You learned to choose scales, not just use them. You check if the biggest number fits. You check the last digits to look for multiples of 5. Then you pick what's easiest to read without too many lines."
components = ["SceneComponent"]

[step_110_identity_building_closure]
dialogue = "That's strategic thinking. You're not just following rules. You're making decisions."

[step_111_identity_building_closure]
dialogue = "Next time, you'll use your graphs to solve problems and answer questions. The scale you choose will help you find answers faster."
