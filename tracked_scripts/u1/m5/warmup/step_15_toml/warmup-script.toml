[step_101_data_collection_game]
dialogue = "You counted all the blocks. Now let's make a graph with your data."

# --- Section: scale_preview_exploration ---
[section_101_scale_preview_exploration]
template = "PLACEHOLDER"

[step_102_scale_preview_exploration]
dialogue = "You know how to use different scales. But which one should you use for YOUR data?"
components = ["SceneComponent"]

[step_103_scale_preview_exploration]
dialogue = "Let's find out. Click each scale to see what the graph would look like."

[step_104_scale_preview_exploration]
dialogue = "All four scales work for this data! You have choices."

# --- Section: efficiency_comparison ---
[section_102_efficiency_comparison]
template = "PLACEHOLDER"

[step_105_efficiency_comparison]
dialogue = "Both of these work. Take a look at them side by side. Which graph is easier to read?"
components = ["SceneComponent", "PromptComponent"]

[step_106_efficiency_comparison]
dialogue = "When more than one scale works, you get to choose."

# --- Section: bridge_lesson ---
[section_103_bridge_lesson]
template = "PLACEHOLDER"

[step_107_bridge_lesson]
dialogue = "You just saw that all four scales worked for your data. Nice to have options! But what if the numbers are bigger? Or what if you need to figure out which scale is best? Let's learn how to figure out which scale to choose, and what tells us that a scale won't work for the data we have."
components = ["SceneComponent"]
