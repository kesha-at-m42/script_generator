title = "synthesis"
type = "sequence"

# --- Section: opening_frame ---
[section_100_opening_frame]
template = "PLACEHOLDER"

[step_100_opening_frame]
dialogue = "You've solved problems that needed one step AND problems that needed two steps. Now let's think about HOW you knew what to do."
components = ["SceneComponent"]

# --- Section: pattern_discovery_type_recognizing_trigger ---
[section_101_pattern_discovery_type_recognizing_trigger]
template = "PLACEHOLDER"

[step_101_pattern_discovery_type_recognizing_trigger]
dialogue = "Look at these three questions. Two of them need two steps. One needs just one step. Which one?"
components = ["SceneComponent", "PromptComponent"]

[step_102_pattern_discovery_type_recognizing_trigger]
dialogue = "What's the clue that tells you a problem needs two steps?"
components = ["PromptComponent"]

# --- Section: consolidation_type_b_sorting_problems ---
[section_102_consolidation_type_b_sorting_problems]
template = "PLACEHOLDER"

[step_103_consolidation_type_b_sorting_problems]
dialogue = "Here's what you've been doing. You look at a problem and decide: Do I just compare? Or do I combine first, then compare? Sort these questions."
components = ["SceneComponent", "PromptComponent"]

[step_104_consolidation_type_b_sorting_problems]
dialogue = "What question do you ask yourself to decide?"
components = ["PromptComponent"]

[step_105_consolidation_type_b_sorting_problems]
dialogue = "This is strategic thinking. You're not just doing math. You're planning your approach based on what the problem says."

# --- Section: real_world_bridge_type_c ---
[section_103_real_world_bridge_type_c]
template = "PLACEHOLDER"

[step_106_real_world_bridge_type_c]
dialogue = "This kind of thinking shows up all the time, not just in math problems."
components = ["SceneComponent", "PromptComponent"]

# --- Section: metacognitive_reflection_type_1_strategy ---
[section_104_metacognitive_reflection_type_1_strategy]
template = "PLACEHOLDER"

[step_107_metacognitive_reflection_type_1_strategy]
dialogue = "What helped you most when figuring out what to do first?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: identity_building_closure ---
[section_105_identity_building_closure]
template = "PLACEHOLDER"

[step_108_identity_building_closure]
dialogue = "You learned something important today. You learned to look at a problem before jumping in. You ask: What should I find first? That's not just math. That's strategic thinking. You're becoming someone who plans before solving."
components = ["SceneComponent"]
