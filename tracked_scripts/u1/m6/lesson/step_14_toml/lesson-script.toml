# --- Section: transition_warmup ---
[section_100_transition_warmup]
template = "PLACEHOLDER"

[step_100_transition_warmup]
dialogue = "In Warmup, you read graphs with different scales. Now let's use graphs to solve problems. Here's data about students' favorite lunch foods. First, a quick check on something you learned before."
components = ["SceneComponent"]

# --- Section: single_step_activation ---
[section_101_single_step_activation]
template = "PLACEHOLDER"

[step_101_single_step_activation]
dialogue = "How many more students chose pizza than salad? Remember what how many more tells us to do."
components = ["SceneComponent", "PromptComponent"]

# --- Section: section_transition ---
[section_102_section_transition]
template = "PLACEHOLDER"

[step_102_section_transition]
dialogue = "Good. How many more means compare, and compare means subtract. You've got that. Now here's something new: What if the problem asks about more than one category?"
components = ["SceneComponent"]

# --- Section: return_warmup_question ---
[section_103_return_warmup_question]
template = "PLACEHOLDER"

[step_103_return_warmup_question]
dialogue = "Remember this question from Warmup? You noticed it needed more than one step. Now let's figure out how to solve it."
components = ["SceneComponent"]

[step_104_return_warmup_question]
dialogue = "First, let's find the categories we need. Which categories does the question ask about? Select all of the needed categories."
components = ["PromptComponent"]

# --- Section: worked_example_with_think_aloud ---
[section_104_worked_example_with_think_aloud]
template = "PLACEHOLDER"

[step_105_worked_example_with_think_aloud]
dialogue = "Let me show you how I solve this. First, I ask myself: What should I find first?"
components = ["SceneComponent"]

[step_106_worked_example_with_think_aloud]
dialogue = "The question says tacos and salad together. That word together tells me to add those first. Let me find that total. Tacos is 25, salad is 10. Combined, that's 35."

[step_107_worked_example_with_think_aloud]
dialogue = "Now I can compare. How many more is pizza than that total of 35? Pizza is 45 while tacos and salad combined is 35. 45 minus 35 is 10. Pizza is 10 more than tacos and salad combined."

# --- Section: strategy_naming ---
[section_105_strategy_naming]
template = "PLACEHOLDER"

[step_108_strategy_naming]
dialogue = "Here's the strategy: When you see combined or together or altogether, find the total of those categories first. Then compare to the other given category."
components = ["SceneComponent"]

[step_109_strategy_naming]
dialogue = "Find the combined total first, then compare. That's the key to these problems."
components = ["PromptComponent"]

# --- Section: guided_practice_full_scaffolding ---
[section_106_guided_practice_full_scaffolding]
template = "PLACEHOLDER"

[step_110_guided_practice_full_scaffolding]
dialogue = "Your turn. Here's a new graph."
components = ["SceneComponent"]

[step_111_guided_practice_full_scaffolding]
dialogue = "This problem needs two steps. What should we find first?"
components = ["PromptComponent"]

[step_112_guided_practice_full_scaffolding]
dialogue = "Scooters and skateboards combined is 45. Now we compare. How many more is bikes than 45?"
components = ["PromptComponent"]

# --- Section: section_transition ---
[section_107_section_transition]
template = "PLACEHOLDER"

[step_113_section_transition]
dialogue = "You're getting it. Find the combined total first, then compare. Let's practice more, and I'll give you less help each time."
components = ["SceneComponent"]

