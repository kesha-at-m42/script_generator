title = "unit_1_module_1_lesson"
type = "sequence"

# --- Section: reading_graph_most_votes ---
[section_100_reading_graph_most_votes]
template = "PLACEHOLDER"

[step_100_reading_graph_most_votes]
dialogue = "You made a graph with your Minis. Now let's read some other graphs. A graph isn't just a picture to look at. Every part gives us information to READ. Look at this Favorite Fruits graph."
components = ["PromptComponent"]

# --- Section: finding_least ---
[section_101_finding_least]
template = "PLACEHOLDER"

[step_101_finding_least]
dialogue = "You found the most. Now find the opposite. Which fruit got the LEAST votes?"
components = ["PromptComponent"]

# --- Section: graph_components_have_jobs ---
[section_102_graph_components_have_jobs]
template = "PLACEHOLDER"

[step_102_graph_components_have_jobs]
dialogue = "Every part of a graph has a job. Watch. The TITLE tells us what the data is about: Animals at the Zoo. The LABELS tell us what each row shows. The KEY shows the SCALE. Here, each animal picture equals 1 animal. That's a scale of 1. Now you try. Click on the part that tells us what each symbol means."
components = ["PromptComponent"]

# --- Section: new_graph_vertical_orientation ---
[section_103_new_graph_vertical_orientation]
template = "PLACEHOLDER"

[step_103_new_graph_vertical_orientation]
dialogue = "Here's a different picture graph. This one goes up and down. We call that VERTICAL. Same idea. Use the key to read it."
components = ["PromptComponent"]

# --- Section: practice_reading_values ---
[section_104_practice_reading_values]
template = "PLACEHOLDER"

[step_104_practice_reading_values]
dialogue = "Let's read one more value from this graph. Which animal has FEWER than 4 at the zoo?"
components = ["PromptComponent"]

# --- Section: picture_to_bar_graph_transition ---
[section_105_picture_to_bar_graph_transition]
template = "PLACEHOLDER"

[step_105_picture_to_bar_graph_transition]
dialogue = "You're reading picture graphs like a pro. Now let's see another way to show data: bar graphs. Same information, different format. Instead of counting symbols, we read where the bar ends."

# --- Section: connecting_bars_to_symbols ---
[section_106_connecting_bars_to_symbols]
template = "PLACEHOLDER"

[step_106_connecting_bars_to_symbols]
dialogue = "In a bar graph, the HEIGHT of the bar tells us the amount. Look at the Monkeys bar. How many monkeys does the bar show? Click on the Monkeys bar and find where the bar ends."
components = ["PromptComponent"]

# --- Section: reading_bar_graphs_independently ---
[section_107_reading_bar_graphs_independently]
template = "PLACEHOLDER"

[step_107_reading_bar_graphs_independently]
dialogue = "Here's a new bar graph. The scale is 1. Each mark on the side means 1 book. How many books did Sofia read? Select your answer."
components = ["PromptComponent"]

# --- Section: reading_fewest_books ---
[section_108_reading_fewest_books]
template = "PLACEHOLDER"

[step_108_reading_fewest_books]
dialogue = "Graphs make comparing easy. You can see which is most and least at a glance by the height of the bars. Who read the FEWEST books this week?"
components = ["PromptComponent"]

# --- Section: horizontal_bar_graph ---
[section_109_horizontal_bar_graph]
template = "PLACEHOLDER"

[step_109_horizontal_bar_graph]
dialogue = "This bar graph goes sideways. We call that HORIZONTAL. The LENGTH of the bar tells us the amount."
components = ["PromptComponent"]

# --- Section: comparing_bar_graphs ---
[section_110_comparing_bar_graphs]
template = "PLACEHOLDER"

[step_110_comparing_bar_graphs]
dialogue = "Same graph, different question. Which color got the LEAST votes?"
components = ["PromptComponent"]

# --- Section: section_transition ---
[section_111_section_transition]
template = "PLACEHOLDER"

[step_111_section_transition]
dialogue = "You found the most and the fewest. Now let's answer some different kinds of questions."

# --- Section: how_many_more_subtract ---
[section_112_how_many_more_subtract]
template = "PLACEHOLDER"

[step_112_how_many_more_subtract]
dialogue = "How many MORE students chose Blue than Yellow? This is a COMPARISON question. How many more means we COMPARE two amounts. We find the DIFFERENCE by subtracting. Blue has 8. Yellow has 6. Since more students like Blue, subtract Blue minus Yellow. How many more students chose Blue than Yellow?"
components = ["PromptComponent"]

# --- Section: how_many_fewer_subtract ---
[section_113_how_many_fewer_subtract]
template = "PLACEHOLDER"

[step_113_how_many_fewer_subtract]
dialogue = "New question: How many FEWER students chose Red than Blue? How many fewer is ALSO a comparison. We still find the difference."
components = ["PromptComponent"]

# --- Section: in_all_add_for_total ---
[section_114_in_all_add_for_total]
template = "PLACEHOLDER"

[step_114_in_all_add_for_total]
dialogue = "Here's a different kind of question: How many students chose Yellow OR Red IN ALL? In all means we want the TOTAL. We ADD to find totals."
components = ["PromptComponent"]

# --- Section: two_step_introduction_sequential ---
[section_115_two_step_introduction_sequential]
template = "PLACEHOLDER"

[step_115_two_step_introduction_sequential]
dialogue = "Sometimes you need TWO steps to answer a question. Let's try one together. Question: How many MORE students chose Yellow or Red together compared to Green? Step 1: Find how many chose Yellow or Red IN ALL. How many liked Yellow or Red in all?"
components = ["PromptComponent"]

[step_116_two_step_introduction_sequential]
dialogue = "Step 2: Now compare that total to Green."
components = ["PromptComponent"]

# --- Section: what_information_needed ---
[section_116_what_information_needed]
template = "PLACEHOLDER"

[step_117_what_information_needed]
dialogue = "Look at this graph. It shows how many pets each student in a class owns. The next question will ask: How many fewer students have fish than dogs? Before we solve it, which categories do you need?"
components = ["PromptComponent"]

# --- Section: solving_with_selected_data ---
[section_117_solving_with_selected_data]
template = "PLACEHOLDER"

[step_118_solving_with_selected_data]
dialogue = "Now solve it. Remember: 'how many fewer' means compare or find the difference. How many fewer students have fish than dogs?"
components = ["PromptComponent"]

# --- Section: two_step_sequential ---
[section_118_two_step_sequential]
template = "PLACEHOLDER"

[step_119_two_step_sequential]
dialogue = "Question: How many MORE students have Cats than Fish and Lizards combined? First, find how many students have Fish OR Lizards at home."
components = ["PromptComponent"]

[step_120_two_step_sequential]
dialogue = "Next, how many MORE students have Cats compared to Fish and Lizards together?"
components = ["PromptComponent"]

# --- Section: bridge_to_exit_check ---
[section_119_bridge_to_exit_check]
template = "PLACEHOLDER"

[step_121_bridge_to_exit_check]
dialogue = "You can read picture graphs and bar graphs. You know how many more and how many fewer mean subtract to find the difference. And in all means add to find the total. Let's see how you can apply what you learned."
