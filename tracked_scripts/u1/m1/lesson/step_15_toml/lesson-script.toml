title = "lesson"
type = "sequence"

# --- Section: reading_graph_most_votes ---
[section_100_reading_graph_most_votes]
template = "chart_template"

[step_100_reading_graph_most_votes]
dialogue = "A graph isn’t just a picture, every part gives us information to read. Let’s look at a new graph. A class of kids voted on their Favorite Fruits. Click on the fruit category that got the most votes."
components = ["SceneComponent", "PromptComponent"]

# --- Section: finding_least ---
[section_101_finding_least]
template = "chart_template"

[step_101_finding_least]
dialogue = "You found the most. Now find the opposite. Which fruit got the LEAST votes?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: graph_components_have_jobs ---
[section_102_graph_components_have_jobs]
template = "chart_template"

[step_102_graph_components_have_jobs]
dialogue = "Every part of a graph has a job. Watch. The [vocab]title[/vocab] tells us what the data is about: Animals at the Zoo. The [vocab]labels[/vocab] tell us what each category shows. The [vocab]key[/vocab] shows the [vocab]scale[/vocab]. Here, each animal picture equals 1 animal. That's a scale of 1. Now you try. Click on the part that tells us what each symbol means."
components = ["SceneComponent", "PromptComponent"]

# --- Section: new_graph_vertical_orientation ---
[section_103_new_graph_vertical_orientation]
template = "chart_template"

[step_103_new_graph_vertical_orientation]
dialogue = "This picture graph is different than the Favorite Fruits graph you saw before. This one goes up and down. We call that [vocab]vertical[/vocab]. Same idea. Use the key to read it. How many monkeys are at the zoo?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: practice_reading_values ---
[section_104_practice_reading_values]
template = "chart_template"

[step_104_practice_reading_values]
dialogue = "Let's read one more value from this graph. Which animal has FEWER than 4 at the zoo?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: picture_to_bar_graph_transition ---
[section_105_picture_to_bar_graph_transition]
template = "chart_template"

[step_105_picture_to_bar_graph_transition]
dialogue = "You’re getting the hang of reading picture graphs. Now let's see another way to show data: bar graphs. Same information, different format. Instead of counting symbols, we read where the bar ends."
components = ["SceneComponent"]

# --- Section: connecting_bars_to_symbols ---
[section_106_connecting_bars_to_symbols]
template = "chart_template"

[step_106_connecting_bars_to_symbols]
dialogue = "In a bar graph, the [vocab]height[/vocab] of the bar tells us the amount. Look at the Monkeys bar. Click on it and find how tall the bar is. That tells us how many monkeys there are."
components = ["SceneComponent", "PromptComponent"]

# --- Section: reading_bar_graphs_independently ---
[section_107_reading_bar_graphs_independently]
template = "chart_template"

[step_107_reading_bar_graphs_independently]
dialogue = "Here's a new bar graph comparing the books read this week by 4 students. The scale is 1. Each mark on the side shows 1 book. How many books did Sofia read? "
components = ["SceneComponent", "PromptComponent"]

# --- Section: reading_fewest_books ---
[section_108_reading_fewest_books]
template = "chart_template"

[step_108_reading_fewest_books]
dialogue = "Graphs make comparing easy. You can see which is most and least at a glance by the height of the bars. Who read the FEWEST books this week? Click the category."
components = ["SceneComponent", "PromptComponent"]

# --- Section: horizontal_bar_graph ---
[section_109_horizontal_bar_graph]
template = "chart_template"

[step_109_horizontal_bar_graph]
dialogue = "This bar graph goes sideways. We call that [vocab]horizontal[/vocab]. The [vocab]length[/vocab] of the bar tells us the amount. Which color on this graph is the most popular? Click on the longest bar."
components = ["SceneComponent", "PromptComponent"]

# --- Section: comparing_bar_graphs ---
[section_110_comparing_bar_graphs]
template = "chart_template"

[step_110_comparing_bar_graphs]
dialogue = "Same graph, different question. Which color got the LEAST votes? Click on the bar."
components = ["SceneComponent", "PromptComponent"]

# --- Section: section_transition ---
[section_111_section_transition]
template = "chart_template"

[step_111_section_transition]
dialogue = "You found the most and the fewest. Now let's answer some different kinds of questions."
components = ["SceneComponent"]

# --- Section: how_many_more_subtract ---
[section_112_how_many_more_subtract]
template = "chart_template"

[step_112_how_many_more_subtract]
dialogue = "How many more students chose blue than yellow? \"How many more\" means we [vocab]compare[/vocab] two amounts. We find the DIFFERENCE by subtracting. Blue has 8 votes. Yellow has 6 votes. Since more students like blue, subtract Blue minus Yellow. How many more students chose blue than yellow?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: how_many_fewer_subtract ---
[section_113_how_many_fewer_subtract]
template = "chart_template"

[step_113_how_many_fewer_subtract]
dialogue = "New question: How many fewer students chose red than blue? \"How many fewer\" tells us to [vocab]compare[/vocab]. We still find the difference."
components = ["SceneComponent", "PromptComponent"]

# --- Section: in_all_add_for_total ---
[section_114_in_all_add_for_total]
template = "chart_template"

[step_114_in_all_add_for_total]
dialogue = "Here's a different kind of question: How many students chose yellow or red IN ALL? When a question asks about things IN ALL or TOGETHER, we [vocab]combine[/vocab] them. We put the parts together to find the total. We ADD to [vocab]combine[/vocab]."
components = ["SceneComponent", "PromptComponent"]

# --- Section: two_step_introduction_sequential ---
[section_115_two_step_introduction_sequential]
template = "chart_template"

[step_115_two_step_introduction_sequential]
dialogue = "Sometimes you need TWO steps to answer a question. Let's try one together. Question: How many more students chose Yellow or Red together compared to Green? Let's break this question into two parts. First, we once again combine Yellow and Red. Then we compare that number to Green. Step 1: Determine how many chose yellow or red together."
components = ["SceneComponent", "PromptComponent"]

[step_116_two_step_introduction_sequential]
dialogue = "Step 2: Now compare that total to Green. How many more is 11 than the votes for Green?"
components = ["PromptComponent"]

# --- Section: what_information_needed ---
[section_116_what_information_needed]
template = "chart_template"

[step_117_what_information_needed]
dialogue = "Look at this graph. It shows how many pets each student in a class owns. The next question will ask: How many fewer students have fish than dogs? Before we solve it, which categories do you need?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: solving_with_selected_data ---
[section_117_solving_with_selected_data]
template = "chart_template"

[step_118_solving_with_selected_data]
dialogue = "Now solve it. Remember: \"how many fewer\" means compare or find the difference. How many fewer students have fish than dogs?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: two_step_sequential ---
[section_118_two_step_sequential]
template = "chart_template"

[step_119_two_step_sequential]
dialogue = "Question: How many more students have cats than fish and lizards combined? First, combine Fish and Lizards. How many students have fish or lizards at home?"
components = ["SceneComponent", "PromptComponent"]

[step_120_two_step_sequential]
dialogue = "Next, how many more students have cats compared to fish and lizards together?"
components = ["PromptComponent"]

# --- Section: bridge_to_exit_check ---
[section_119_bridge_to_exit_check]
template = "chart_template"

[step_121_bridge_to_exit_check]
dialogue = "You can read picture graphs and bar graphs. You know \"how many more\" and \"how many fewer\" mean to [vocab]compare[/vocab], subtract to find the difference. You know \"in all\" means [vocab]combine[/vocab], add to find the total. Let's see what you know."
components = ["SceneComponent"]
