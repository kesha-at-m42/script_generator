title = "warmup"
type = "sequence"

# --- Section: data_collection ---
[section_100_data_collection]
template = "PLACEHOLDER"

[step_100_data_collection]
dialogue = "The Minis are here. Let's count what we see. Use the counter to keep track of each group."
components = ["SceneComponent"]

[step_101_data_collection]
dialogue = "Let's check your counts. There were [X] [category A], [Y] [category B], and [Z] [category C]. Now we've got our data."

# --- Section: symbol_introduction ---
[section_101_symbol_introduction]
template = "PLACEHOLDER"

[step_102_symbol_introduction]
dialogue = "Let's make a picture graph with your data. We're using stars this time. See how each star stands for 1 item."
components = ["SceneComponent"]

# --- Section: model_first_category ---
[section_102_model_first_category]
template = "PLACEHOLDER"

[step_103_model_first_category]
dialogue = "Watch how I show Red on the graph. You counted 5 Red. So I'm adding 5 symbols. One... two... three... four... five. There. 5 symbols for Red. Each symbol stands for 1 item."
components = ["SceneComponent"]

# --- Section: student_places_category_b ---
[section_103_student_places_category_b]
template = "PLACEHOLDER"

[step_104_student_places_category_b]
dialogue = "Your turn. You counted 5 Cats. Add 5 cat symbols -- one for each Cat you counted."
components = ["SceneComponent", "PromptComponent"]

# --- Section: student_places_category_c ---
[section_104_student_places_category_c]
template = "PLACEHOLDER"

[step_105_student_places_category_c]
dialogue = "Now Yellow. You counted 8. Click to add 8 stars."
components = ["SceneComponent", "PromptComponent"]

# --- Section: bridge_to_lesson ---
[section_105_bridge_to_lesson]
template = "PLACEHOLDER"

[step_106_bridge_to_lesson]
dialogue = "You made a picture graph with your data. Picture graphs can show all kinds of information. Let's see what else we can learn from them."
components = ["SceneComponent"]
