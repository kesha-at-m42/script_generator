# exitcheck-script.toml

title = "exitcheck"
type = "sequence"

# ---------------------------------------------------------------------------
# Section 1 - ec_1_read_value
# ---------------------------------------------------------------------------

[section_101_ec_1_read_value]
template = "chart_template"

[step_101_ec_1_read_value]
dialogue = "Look at this Popular Snacks picture graph showing what students chose as their favorite snack. How many students chose crackers?"
components = ["SceneComponent", "PromptComponent"]
prompt_text = "How many students chose crackers?"

[step_101.correct]
dialogue = "7 students chose crackers. That's what the picture graph shows. Each symbol is 1 vote and there are 7 symbols."
metadata = { sting_id = "on_correct" }

[step_101.step_502]
dialogue = "You found the Pretzels column. Look at the Crackers column, count the symbols labeled Crackers."
id = "3"

[step_101.step_503]
dialogue = "You found the Fruit column. Look at the column labeled Crackers. How many symbols are in that category?"
id = "4"

[step_101.step_504]
dialogue = "That's the Popcorn value. Find the category that says Crackers and count those symbols."
id = "5"

[step_101.step_505]
dialogue = "Let me show you how this works. Find the category labeled Crackers. Then count each symbol: 1, 2, 3, 4, 5, 6, 7. Each symbol represents 1 student so 7 students chose crackers."
id = "heavy"

# ---------------------------------------------------------------------------
# Section 2 - ec_2_find_fewest
# ---------------------------------------------------------------------------

[section_102_ec_2_find_fewest]
template = "chart_template"

[step_102_ec_2_find_fewest]
dialogue = "Look at this Favorite Seasons bar graph. Click on which season the fewest students like."
components = ["PromptComponent"]
prompt_text = "Click on which season the fewest students like."

[step_102.correct]
dialogue = "That's it. Fall shows the fewest, only 4 votes."
metadata = { sting_id = "on_correct" }

[step_102.step_507]
dialogue = "That's not it. Look for the shortest bar. That will show the fewest votes."
id = "light"

[step_102.step_508]
dialogue = " Not that one. The fewest means the smallest number. Which bar is shorter than all the others?"
id = "medium"

[step_102.step_509]
dialogue = "Let's look at it together. To find the fewest, we look for the shortest bar. Spring goes to 6, Summer to 9, Fall to 4, and Winter to 5. Fall has the shortest bar at 4 votes, that's the fewest."
id = "heavy"

# ---------------------------------------------------------------------------
# Section 3 - ec_3_how_many_more
# ---------------------------------------------------------------------------

[section_103_ec_3_how_many_more]
template = "chart_template"

[step_103_ec_3_how_many_more]
dialogue = "This bar graph shows the number of books read by four students this week. How many more books did Ava read than Dan?"
components = ["PromptComponent"]
prompt_text = "How many more books did Ava read than Dan?"

[step_103.correct]
dialogue = "5 more books. Ava read 8, Dan read 3. The difference is 5."
metadata = { sting_id = "on_correct" }

[step_103.step_511]
dialogue = "You found Dan's number of books. But we need the difference, how many more books Ava has read than Dan. Compare their bar heights."
id = "3"

[step_103.step_512]
dialogue = "You found Ava's number of books. But the question asks how many more. We need to find the difference between Ava's 8 books and Dan's books."
id = "8"

[step_103.step_513]
dialogue = "No, not exactly. When we ask \"how many more,\" we SUBTRACT to find the difference. Look at Ava's bar and Dan's bar: how much taller is Ava's?"
id = "11"

[step_103.step_514]
dialogue = "Let me show you how this works. Ava read 8 books because her bar reaches to 8. Dan read 3 books since his bar reaches to 3. To find how many more, we subtract: 8 minus 3 equals 5. Ava read 5 more books than Dan."
id = "heavy"

# ---------------------------------------------------------------------------
# Section 4 - ec_4_in_all
# ---------------------------------------------------------------------------

[section_104_ec_4_in_all]
template = "chart_template"

[step_104_ec_4_in_all]
dialogue = "Look at this Books Read This Week bar graph again. How many books did Ben and Cara read this week in all?"
components = ["PromptComponent"]
prompt_text = "How many books did Ben and Cara read this week in all?"

[step_104.correct]
dialogue = "11 books in all. Ben read 5, Cara read 6. You added to combine and find the total."
metadata = { sting_id = "on_correct" }

[step_104.step_516]
dialogue = "You found Cara's 6 books. The question asks for Ben and Cara in all. We need to add both amounts together."
id = "6"

[step_104.step_517]
dialogue = "Let's look at the right people. The question asks about Ben and Cara. Check which bars those are, then add the two numbers."
id = "9"

[step_104.step_518]
dialogue = "Check the names carefully. The question asks about Ben and Cara. Find their bars, read the numbers, then combine."
id = "14"

[step_104.step_519]
dialogue = "Here is how we work through this problem. \"In all\" is a COMBINE problem. First, find Ben's bar: it shows 5 books. Then find Cara's bar: it shows 6 books. To combine, we add: 5 plus 6 equals 11. They read 11 books in all this week."
id = "heavy"

# ---------------------------------------------------------------------------
# Section 5 - ec_closure
# ---------------------------------------------------------------------------

[section_105_ec_closure]
template = "chart_template"

[step_105_ec_closure]
dialogue = "You're ready to practice."
