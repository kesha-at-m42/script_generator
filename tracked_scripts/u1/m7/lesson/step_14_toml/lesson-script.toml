# --- Section: transition_warmup_worked_example_worked ---
[section_100_transition_warmup_worked_example_worked]
template = "PLACEHOLDER"

[step_100_transition_warmup_worked_example_worked]
dialogue = "In our Warmup, you saw that graph scales are equal groups. But equal groups show up everywhere, not just in graphs. Today you're going to learn the name for these groups, see them in all kinds of pictures, and discover a new math symbol that makes them easy to write down. Check this out."
components = ["SceneComponent"]

[step_101_transition_warmup_worked_example_worked]
dialogue = "Let me show you how I figure out the groups here. First, I count the bags. First, count the groups. How many bags? 1, 2, 3. Three bags. These are my groups."

[step_102_transition_warmup_worked_example_worked]
dialogue = "Next, look inside one bag. How many? 1, 2, 3, 4. Four items in each bag. That's how many are in each group."

[step_103_transition_warmup_worked_example_worked]
dialogue = "So I have three groups of four. Say it with me: three groups of four."

[step_104_transition_warmup_worked_example_worked]
dialogue = "We can write three groups of four like this: 3 × 4."

