[step_115_two_ways_show_scale_5]
dialogue = "Here's the same Playground data from the picture graph as a bar graph. You've read bar graphs before."

[step_116_two_ways_show_scale_5]
dialogue = "In a picture graph, you count by 5s using symbols: 5, 10, 15, 20, 25. In a bar graph, you count by 5s using the numbers written along the side of the graph on the [vocab]axis[/vocab]. Look: 5, 10, 15, 20, 25, 30. Same skip-counting, just written on the side. Both graphs count by 5s. Where do you see the 5s on the bar graph?"
components = ["PromptComponent"]
prompt_text = "Where do you see the 5s on the bar graph?"

[step_116.correct]
dialogue = "Right. The axis shows the skip-counting: 5, 10, 15, 20, 25, 30. That's your scale of 5, built right into the side of the graph."
metadata = { sting_id = "on_correct" }

[step_116.step_532]
dialogue = "This is a bar graph, not a picture graph. Bar graphs don't use symbols. Look for the numbers on the bar graph.."
id = "in_symbols"

[step_116.step_533]
dialogue = "The title names what the graph is about. The scale is shown by numbers on the bar graph. Where are those numbers?"
id = "in_title"

[step_116.step_534]
dialogue = "Let’s find them together. Watch the axis. The numbers go 0, 5, 10, 15, 20, 25, 30. That's counting by 5s. The axis is where the scale lives in a bar graph. The axis shows scale of 5 on the bar graph."
id = "heavy"

