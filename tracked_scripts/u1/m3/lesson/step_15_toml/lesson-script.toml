# ---------------------------------------------------------------------------
# Section 1 - building_on_scale_comparison
# ---------------------------------------------------------------------------

[section_101_building_on_scale_comparison]
template = "chart_template"

[step_101_building_on_scale_comparison]
dialogue = "In Warmup, you saw something important. Same data, but the scale of 5 graph needed fewer symbols. That's because each symbol represents MORE."
components = ["SceneComponent"]

[step_102_building_on_scale_comparison]
dialogue = "Same data, fewer symbols. That's why scale of 5 is useful when numbers get bigger. What does each symbol represent when the scale is 5?"
components = ["PromptComponent"]
prompt_text = "What does each symbol represent when the scale is 5?"

[step_102.correct]
dialogue = "Right. Each symbol represents 5 items. That's the scale."
metadata = { sting_id = "on_correct" }

[step_102.step_502]
dialogue = "You're looking at the scale of 2 graph. Look at the key on the scale of 5 graph. What does it say each symbol equals?"
id = "2"

[step_102.step_503]
dialogue = "The key tells you exactly what each symbol stands for. Read the key on the scale of 5 graph. What number do you see?"
id = "10"

[step_102.step_504]
dialogue = "When the scale is 5, each symbol represents 5 items, not 1. Look at the key. It shows what each symbol equals."
id = "1"

[step_102.step_505]
dialogue = "Let me show you. The key says Each symbol equals 5. That means every symbol you see on this graph represents 5 items. When the scale is 5, each symbol stands for 5. That's what makes it a scale of 5."
id = "heavy"

# ---------------------------------------------------------------------------
# Section 2 - grouping_animation_groups_5_worked
# ---------------------------------------------------------------------------

[section_102_grouping_animation_groups_5_worked]
template = "chart_template"

[step_103_grouping_animation_groups_5_worked]
dialogue = "Here is a table showing what playground activities students voted for as their favorites. Let's see how 20 items become symbols when the scale is 5. Watch. We'll group by 5s."

[step_104_grouping_animation_groups_5_worked]
dialogue = "5, 10, 15, 20. That's 4 groups of 5."

[step_105_grouping_animation_groups_5_worked]
dialogue = "20 items equals 4 symbols. Each symbol shows 5."

# ---------------------------------------------------------------------------
# Section 3 - skip_counting_connection
# ---------------------------------------------------------------------------

[section_103_skip_counting_connection]
template = "chart_template"

[step_106_skip_counting_connection]
dialogue = "It's easier to read this picture graph if you can count by 5s. That's exactly what we do with scale of 5."

[step_107_skip_counting_connection]
dialogue = "Let's check: does the picture graph for the Swings category match our data table? 4 symbols, scale of 5. Count by 5s. What's the total?"
components = ["PromptComponent"]
prompt_text = "What is the total represented by the picture graph for Swings?"

[step_107.correct]
dialogue = "Right. 20 items. 5, 10, 15, 20. Skip counting tells you the total in the picture graph, and that matches the value in the data table."
metadata = { sting_id = "on_correct" }

[step_107.step_507]
dialogue = "You counted the symbols. But each symbol stands for more than 1. Check the key. What does each symbol represent? Skip count by the value in the key."
id = "4"

[step_107.step_508]
dialogue = "Look at the key. Each symbol equals 5. Count by 5s: one symbol is 5, two symbols is 10. Keep going."
id = "9"

[step_107.step_509]
dialogue = "You're counting by 5s. But check how many symbols are in the column. Count all of them: 5, 10, 15. That’s 3 symbols. How many symbols does Swings have?"
id = "15"

[step_107.step_510]
dialogue = "Let’s think through this. Look at the key: each symbol equals 5. Now skip count by 5s along the Swings category: one symbol is 5, two symbols 10, three symbols 15, four symbols 20. The picture graph shows 20 because we skip count by the scale."
id = "heavy"

