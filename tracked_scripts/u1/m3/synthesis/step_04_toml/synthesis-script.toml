title = "synthesis"
type = "sequence"

# --- Section: opening_frame ---
[section_100_opening_frame]
template = "PLACEHOLDER"

[step_100_opening_frame]
dialogue = "You made graphs with scale of 5. Let's connect what you learned to the world around you."
components = ["SceneComponent"]

# --- Section: real_world_bridge_type_c ---
[section_101_real_world_bridge_type_c]
template = "PLACEHOLDER"

[step_101_real_world_bridge_type_c]
dialogue = "You've been grouping by 5s all lesson. But 5s show up everywhere in real life! Which of these uses groups of 5?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: metacognitive_reflection_two_scales_your ---
[section_102_metacognitive_reflection_two_scales_your]
template = "PLACEHOLDER"

[step_102_metacognitive_reflection_two_scales_your]
dialogue = "You now know TWO scales for making graphs. If you had to show 30 items on a graph, which scale would need fewer symbols?"
components = ["SceneComponent", "PromptComponent"]

[step_103_metacognitive_reflection_two_scales_your]
dialogue = "You're building a toolkit. Scale of 2 works. Scale of 5 works. Soon you'll learn when to use each one."

# --- Section: identity_building_closure_bridge_m4 ---
[section_103_identity_building_closure_bridge_m4]
template = "PLACEHOLDER"

[step_104_identity_building_closure_bridge_m4]
dialogue = "You started this unit knowing scale of 2. Now you can make graphs with scale of 5 too. And you made BOTH picture graphs AND bar graphs. Two formats, both showing the same data. Two scales in your toolkit. Two formats you can create. You're ready for more. You started with scale of 1, then 2, now 5. Next time, we'll add scale of 10 to your toolkit."
components = ["SceneComponent"]
