title = "synthesis"
type = "sequence"

# --- Section: opening_frame ---
[section_100_opening_frame]
template = "array_template"

[step_100_opening_frame]
dialogue = "You've been describing arrays and building expressions and equations. Let's connect what you've been working on."

# --- Section: real_world_array_to_dot ---
[section_101_real_world_array_to_dot]
template = "array_template"

[step_101_real_world_array_to_dot]
dialogue = "Check out these two pictures. A muffin tin and a dot array. What expression describes them both by rows?"
components = ["PromptComponent"]

# --- Section: same_array_two_products ---
[section_102_same_array_two_products]
template = "array_template"

[step_102_same_array_two_products]
dialogue = "Here's an array you've worked with before. If we look at the rows, it's 3 times 5 equals 15. If we look at the columns, it's 5 times 3 equals 15. Take a look at both equations. What do you notice about the products?"
components = ["PromptComponent"]

[step_103_same_array_two_products]
dialogue = "Same array, two different descriptions, but the product stays the same. Interesting, right? We'll explore why that works next time"

# --- Section: arrays_real_world ---
[section_103_arrays_real_world]
template = "array_template"

[step_104_arrays_real_world]
dialogue = "Arrays aren't just something we do in math. Take a look at these four pictures. Which ones show arrays?"
components = ["PromptComponent"]

[step_105_arrays_real_world]
dialogue = "You can spot arrays everywhere. Same math, rows times items per row or columns times items per column, no matter what the objects are."

# --- Section: metacognitive_reflection ---
[section_104_metacognitive_reflection]
template = "array_template"

[step_106_metacognitive_reflection]
dialogue = "If you had to pick one thing from today to remember, what would it be?"
components = ["PromptComponent"]

# --- Section: identity_building_closure ---
[section_105_identity_building_closure]
template = "array_template"

[step_107_identity_building_closure]
dialogue = "You came in knowing about equal groups in bags and boxes. Now you're seeing them lined up as arrays with rows and columns. You can describe the same array two different ways. You can write the expression for each one. And you can find the product."

[step_108_identity_building_closure]
dialogue = "You noticed something about those two products. Next time, we're going to figure out WHY that happens and whether it's always true. Get ready."
