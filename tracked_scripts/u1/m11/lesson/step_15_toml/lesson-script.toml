title = "lesson"
type = "sequence"

# --- Section: transition_introduce_array ---
[section_100_transition_introduce_array]
template = "array_template"

[step_100_transition_introduce_array]
dialogue = "Check out this sticker sheet. The stickers aren't bunched up or scattered around. Every sticker has its own spot. Here's what I notice."

[step_101_transition_introduce_array]
dialogue = "The stickers are lined up. They go across, and they go up and down. Everything lines up into a rectangle."

[step_102_transition_introduce_array]
dialogue = "When objects are arranged like this, lined up in a rectangle with every spot filled, that's called an [vocab]array[/vocab]."

# --- Section: introduce_row_column_vocabulary ---
[section_101_introduce_row_column_vocabulary]
template = "array_template"

[step_103_introduce_row_column_vocabulary]
dialogue = "Here's what we call the parts you're looking at. Watch. See this line going across? That's a [vocab]row[/vocab]. Rows go across, left to right. Row 1, row 2, row 3. Three rows, all going across. Now the other direction. See this line going up and down? That's a [vocab]column[/vocab]. Columns go up and down. Column 1, column 2, column 3, column 4. Four columns, all up and down."

[step_104_introduce_row_column_vocabulary]
dialogue = "Think about the difference: rows go across, columns go up and down. How many rows going across does this array have?"
components = ["PromptComponent"]

# --- Section: identify_rows_columns ---
[section_102_identify_rows_columns]
template = "array_template"

[step_105_identify_rows_columns]
dialogue = "Here's a new array, this time with dots. How many rows does this array have? Remember, rows go across."
components = ["PromptComponent"]

[step_106_identify_rows_columns]
dialogue = "Now how many columns? Columns go up and down."
components = ["PromptComponent"]

# --- Section: row_description_to_expression ---
[section_103_row_description_to_expression]
template = "array_template"

[step_107_row_description_to_expression]
dialogue = "This array has 3 rows. Each row has 5 dots. We can say: 3 rows of 5."

[step_108_row_description_to_expression]
dialogue = "Here's how we write that as a multiplication expression."

[step_109_row_description_to_expression]
dialogue = "Start with the words: 3 rows of 5. The first number is how many rows. That's 3."

[step_110_row_description_to_expression]
dialogue = "The second number is how many in each row. That's 5."

[step_111_row_description_to_expression]
dialogue = "3 rows of 5. That's just like saying 3 groups of 5. You already know equal groups means multiplication. So 3 rows of 5 becomes 3 times 5."

[step_112_row_description_to_expression]
dialogue = "Now here's a new array."

[step_113_row_description_to_expression]
dialogue = "Build the expression for this array. The first number is how many rows. The second is how many in each row."
components = ["PromptComponent"]

# --- Section: independent_row_expression ---
[section_104_independent_row_expression]
template = "array_template"

[step_114_independent_row_expression]
dialogue = "One more. Check out this array and build the expression for the rows."
components = ["PromptComponent"]

# --- Section: section_1_transition ---
[section_105_section_1_transition]
template = "array_template"

[step_115_section_1_transition]
dialogue = "You've been describing arrays by rows, those lines going across. But there's another way to describe them. Let's explore this together."

# --- Section: introduce_column_description ---
[section_106_introduce_column_description]
template = "array_template"

[step_116_introduce_column_description]
dialogue = "You just described this array by [vocab]rows[/vocab]: 2 rows of 5. That gave us 2 times 5."

[step_117_introduce_column_description]
dialogue = "Now watch what happens when I look at the [vocab]columns[/vocab] instead."

[step_118_introduce_column_description]
dialogue = "I see 5 columns. Each one has 2 dots. So I can also say this is 5 columns of 2."

[step_119_introduce_column_description]
dialogue = "5 columns of 2 becomes 5 times 2. The first number tells me how many columns. The second number tells me how many in each column."

[step_120_introduce_column_description]
dialogue = "Same array. Different way to describe it, which gives us a different expression. 2 rows of 5 was 2 times 5. 5 columns of 2 is 5 times 2. Both describe this array."

[step_121_introduce_column_description]
dialogue = "Here's what matters: your DESCRIPTION determines your EXPRESSION. What you SAY to describe the array becomes the expression you WRITE. Let's try one."

[step_122_introduce_column_description]
dialogue = "This array has 4 rows of 3. But what if we describe it by COLUMNS? Count the columns going up and down. Then count how many dots are in each column."
components = ["PromptComponent"]

[step_123_introduce_column_description]
dialogue = "Now write the expression that matches the column description."
components = ["PromptComponent"]

# --- Section: both_descriptions_same_array ---
[section_107_both_descriptions_same_array]
template = "array_template"

[step_124_both_descriptions_same_array]
dialogue = "Look at this array. Let's describe it by rows first. How many rows do you see, and how many in each row? Build the expression."
components = ["PromptComponent"]

[step_125_both_descriptions_same_array]
dialogue = "Same array. Now describe it by columns. How many columns, and how many in each column? Build that expression."
components = ["PromptComponent"]

# --- Section: mixed_concrete_dots_bridge ---
[section_108_mixed_concrete_dots_bridge]
template = "array_template"

[step_126_mixed_concrete_dots_bridge]
dialogue = "Check out these two pictures. On the left, an ice cube tray. On the right, a dot array. Same number of rows. Same number of columns. Whether you're looking at ice cubes or dots, it's the same array. 2 rows of 6. The math works the same way no matter what's filling the spots. Build the row expression."
components = ["PromptComponent"]

# --- Section: choose_description_write_equation_compute ---
[section_109_choose_description_write_equation_compute]
template = "array_template"

[step_127_choose_description_write_equation_compute]
dialogue = "For this array, you get to choose. You can describe this array by rows, or you can describe it by columns. Either way works. First, pick one. Would you like to describe the array by rows or columns?"
components = ["PromptComponent"]

[step_128_choose_description_write_equation_compute]
dialogue = "Now describe the array by rows in words and build the equation."
components = ["PromptComponent"]

[step_129_choose_description_write_equation_compute]
dialogue = "Now describe the array by columns in words and build the equation."
components = ["PromptComponent"]

# --- Section: section_2_transition ---
[section_110_section_2_transition]
template = "array_template"

[step_130_section_2_transition]
dialogue = "You can describe the same array two ways: by rows or by columns. Each gives you a different expression. Now let's flip it and start with the expression to build arrays."

# --- Section: worked_example_build_by_rows ---
[section_111_worked_example_build_by_rows]
template = "array_template"

[step_131_worked_example_build_by_rows]
dialogue = "Let me show you how this works. I want to make 3 rows of 5. I said 3 rows first, so I build the rows first. I add the first row. Second row. Third row. Three rows set up, but no dots yet. I need to add items to each row to fill them in."

[step_132_worked_example_build_by_rows]
dialogue = "So now I add items to each row. Watch this. Each plus puts one dot in every row. One dot in each row. That's 3 dots total. Two dots in each row. Six dots. Keep watching. Three, four, five in each row. 3 rows of 5. 15 dots. I built the array."

[step_133_worked_example_build_by_rows]
dialogue = "Now I write the equation. 3 rows of 5. 3 times 5 equals 15. I planned it, built it, found the product. Your turn now."

# --- Section: build_array_rows_first ---
[section_112_build_array_rows_first]
template = "array_template"

[step_134_build_array_rows_first]
dialogue = "Build an array with 4 rows of 6. Start by making the rows."
components = ["PromptComponent"]

[step_135_build_array_rows_first]
dialogue = "Now fill in each row with 6 items."
components = ["PromptComponent"]

[step_136_build_array_rows_first]
dialogue = "Now let's write the equation that matches the 4 rows of 6 array you built."
components = ["PromptComponent"]

# --- Section: build_by_columns_write_equation ---
[section_113_build_by_columns_write_equation]
template = "array_template"

[step_137_build_by_columns_write_equation]
dialogue = "Let's try building by columns this time. Make 2 columns of 5. Add the columns first."
components = ["PromptComponent"]

[step_138_build_by_columns_write_equation]
dialogue = "2 columns of 5. Now add items to each column. Every time you tap \"Items per Column +\", one dot goes in each column."
components = ["PromptComponent"]

[step_139_build_by_columns_write_equation]
dialogue = "Now write the equation that matches 2 columns of 5."
components = ["PromptComponent"]

# --- Section: open_specification_build_given_total ---
[section_114_open_specification_build_given_total]
template = "array_template"

[step_140_open_specification_build_given_total]
dialogue = "Last one. I want an array with 20 dots total. You choose how to build it with rows first or columns first, and whatever numbers you want. Then write the equation. There's more than one way to do this."
components = ["PromptComponent", "PromptComponent"]

[step_141_open_specification_build_given_total]
dialogue = "You've got the array. Now describe it with words."
components = ["PromptComponent"]

[step_142_open_specification_build_given_total]
dialogue = "Now the equation. What multiplication does this array show?"
components = ["PromptComponent"]

[step_143_open_specification_build_given_total]
components = ["PromptComponent"]

[step_144_open_specification_build_given_total]
dialogue = "You've got the array. Now describe it with words."
components = ["PromptComponent"]

[step_145_open_specification_build_given_total]
dialogue = "Now the equation. What multiplication does this array show?"
components = ["PromptComponent"]

# --- Section: bridge_to_exit_check ---
[section_115_bridge_to_exit_check]
template = "array_template"

[step_146_bridge_to_exit_check]
dialogue = "You learned to describe arrays by rows or columns, write expressions for both, and find the product. Let's see how you do with this."
