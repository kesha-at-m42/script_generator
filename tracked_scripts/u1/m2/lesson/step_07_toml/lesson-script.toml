title = "lesson"
type = "sequence"

# --- Section: your_scaled_graph ---
[section_100_your_scaled_graph]
template = "chart_template"

[step_100_your_scaled_graph]
dialogue = "You already began to read this graph. You counted 5 symbols for Oranges. Each symbol shows 2 items, not 1. This is called a [vocab]SCALED picture graph[/vocab]. Let's find out how to tell that symbol equals 2."
components = ["SceneComponent"]

# --- Section: what_is_key_scale ---
[section_101_what_is_key_scale]
template = "chart_template"

[step_101_what_is_key_scale]
dialogue = "Every graph has a [vocab]key[/vocab]. The [vocab]key[/vocab] is like a decoder. It tells you what each symbol MEANS. This [vocab]key[/vocab] says: each symbol equals 2. That \"2\" is called the [vocab]scale[/vocab]. [vocab]Scale of 1[/vocab] means each symbol shows 1 item. So what does [vocab]scale of 2[/vocab] mean?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: using_key_to_read ---
[section_102_using_key_to_read]
template = "chart_template"

[step_102_using_key_to_read]
dialogue = "Here's a new graph about a class's favorite playground equipment. First step: check the [vocab]key[/vocab]. What is the [vocab]scale[/vocab] of this graph?"
components = ["SceneComponent", "PromptComponent"]

[step_103_using_key_to_read]
dialogue = "Let's look at one category. Monkey Bars has 5 symbols. Each symbol equals 2 votes. So how many voted for Monkey Bars as their favorite playground equipment?"
components = ["PromptComponent"]

# --- Section: create_guided_popcorn ---
[section_103_create_guided_popcorn]
template = "chart_template"

[step_104_create_guided_popcorn]
dialogue = "Here is a table showing people’s favorite snacks. Let’s make a picture graph of this data. Some of the categories have been filled in already. Let's graph \"Popcorn\" together. The table shows 8 people chose Popcorn. 8 is an [vocab]even number[/vocab]. It groups perfectly into 2s. 8 splits into 4 groups of 2. Place 4 symbols for Popcorn."
components = ["SceneComponent", "PromptComponent"]

# --- Section: more_practice_even ---
[section_104_more_practice_even]
template = "chart_template"

[step_105_more_practice_even]
dialogue = "Now let's finish this picture graph by filling in the Chips. The table shows 10 people chose Chips. 10 is also an [vocab]even number[/vocab]. It groups into 2s perfectly. Place symbols for Chips."
components = ["SceneComponent", "PromptComponent"]

# --- Section: checking_graph_two_step ---
[section_105_checking_graph_two_step]
template = "chart_template"

[step_106_checking_graph_two_step]
dialogue = "You made a scaled picture graph. Let's check: which snack got the most votes?"
components = ["SceneComponent", "PromptComponent"]

[step_107_checking_graph_two_step]
dialogue = "How many votes did Crackers get?"
components = ["PromptComponent"]

# --- Section: how_many_more ---
[section_106_how_many_more]
template = "chart_template"

[step_108_how_many_more]
dialogue = "Let's compare some favorite snacks. How many more people chose Crackers than Popcorn?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: s2_transition ---
[section_107_s2_transition]
template = "chart_template"

[step_109_s2_transition]
dialogue = "You made graphs with numbers like 8, 10, 12, 14. Those are [vocab]even numbers[/vocab], they group into 2s perfectly. But what happens with [vocab]odd numbers[/vocab]?"
components = ["SceneComponent"]

# --- Section: problem_with_7 ---
[section_108_problem_with_7]
template = "chart_template"

[step_110_problem_with_7]
dialogue = "This graph show animals that were sighted while on a nature walk. The [vocab]key[/vocab] shows \"Each ⭐ = 2\", so we need to group into 2's to make the graph. Look at Birds: 7 sightings. Let's try to group 7 into 2's. 7 makes 3 groups of 2, with 1 left over. How do we show the leftover 1 with our symbols?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: half_symbol_teaching ---
[section_109_half_symbol_teaching]
template = "chart_template"

[step_111_half_symbol_teaching]
dialogue = "Half of 2 is 1. So a half-symbol shows 1 sighting. How many sightings does 3 and a half symbols show?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: create_with_half_symbols ---
[section_110_create_with_half_symbols]
template = "chart_template"

[step_112_create_with_half_symbols]
dialogue = "Now you place the symbols on the graph to show 7 Bird sightings. Remember: 7 needs 3 full symbols and 1 half-symbol."
components = ["SceneComponent", "PromptComponent"]

# --- Section: complete_graph_rabbits ---
[section_111_complete_graph_rabbits]
template = "chart_template"

[step_113_complete_graph_rabbits]
dialogue = "Keep going with this data. Rabbits have 8 sightings. Think about if 8 needs a half-symbol. Fill in the picture graph for Rabbits."
components = ["SceneComponent", "PromptComponent"]

# --- Section: how_many_in_all ---
[section_112_how_many_in_all]
template = "chart_template"

[step_114_how_many_in_all]
dialogue = "The picture graph is complete. Let's answer some questions using the graph. How many animals sighted were Birds and Deer IN ALL?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: comparison_odd_values ---
[section_113_comparison_odd_values]
template = "chart_template"

[step_115_comparison_odd_values]
dialogue = "How many FEWER Birds were sighted than Squirrels?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: s3_transition ---
[section_114_s3_transition]
template = "chart_template"

[step_116_s3_transition]
dialogue = "You created scaled picture graphs with [vocab]even[/vocab] numbers that grouped perfectly into 2s. You used HALF-SYMBOLS for [vocab]odd[/vocab] numbers, because there's always 1 left over. Now let's see if you can handle BOTH together. A mix of even and odd in picture graphs, all on your own."
components = ["SceneComponent"]

# --- Section: create_mixed_maya ---
[section_115_create_mixed_maya]
template = "chart_template"

[step_117_create_mixed_maya]
dialogue = "This table shows the number of books read this week by 4 students. Build Maya's row in the picture graph first. Notice the key: \"Each symbol = 2 books\". From the table, Maya read 9 books. Before you graph, think: is 9 is even or odd? Will you need a half-symbol? Then build Maya's column."
components = ["SceneComponent", "PromptComponent"]

# --- Section: create_full_graph ---
[section_116_create_full_graph]
template = "chart_template"

[step_118_create_full_graph]
dialogue = "Build the whole picture graph. Use the key and the table to figure out how many symbols each person needs. Place symbols for all remaining categories."
components = ["SceneComponent", "PromptComponent"]

# --- Section: s3_2b_scale_reflection ---
[section_117_s3_2b_scale_reflection]
template = "chart_template"

[step_119_s3_2b_scale_reflection]
dialogue = "Here's the same data showing the number of books read but with scale of 1. Every book gets its own symbol. Look at James. Your graph with scale of 2 shows 6 symbols. The scale-of-1 graph shows 12 symbols. Same number of books!"
components = ["SceneComponent", "PromptComponent"]

# --- Section: who_read_most ---
[section_118_who_read_most]
template = "chart_template"

[step_120_who_read_most]
dialogue = "Now let's use your scale of 2 graph to answer: Who read the most books?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: how_many_in_all_james_aiden ---
[section_119_how_many_in_all_james_aiden]
template = "chart_template"

[step_121_how_many_in_all_james_aiden]
dialogue = "How many books did James and Aiden read IN ALL?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: two_step_chained ---
[section_120_two_step_chained]
template = "chart_template"

[step_122_two_step_chained]
dialogue = "Here's a two-step problem. How many more books did Maya and Sofia read together than James? Let's break it down. First we need to [vocab]combine[/vocab] Maya and Sofia's books and then we need to [vocab]compare[/vocab] their books to James. Step 1: How many books did Maya and Sofia read together?"
components = ["SceneComponent", "PromptComponent"]

[step_123_two_step_chained]
dialogue = "Same two-step question: How many more more books did Maya and Sofia read together than James? Now step 2: Compare James to the total of 16 books from Maya and Sofia."
components = ["PromptComponent"]

# --- Section: s3_bridge_to_exit ---
[section_121_s3_bridge_to_exit]
template = "chart_template"

[step_124_s3_bridge_to_exit]
dialogue = "You made scaled picture graphs. You know when each symbol equals 2. You know half-symbols show 1. Let's see what you know."
components = ["SceneComponent"]
