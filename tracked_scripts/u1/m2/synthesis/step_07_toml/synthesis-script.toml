title = "synthesis"
type = "sequence"

# --- Section: s5_opening_frame ---
[section_100_s5_opening_frame]
template = "chart_template"

[step_100_s5_opening_frame]
dialogue = "You made scaled picture graphs. You used half-symbols for odd numbers. Now let's see WHY scaled graphs are useful."
components = ["SceneComponent"]

# --- Section: scale_toggle ---
[section_101_scale_toggle]
template = "chart_template"

[step_101_scale_toggle]
dialogue = "Here's data about people's pets and a graph with scale of 2. But watch what happens when you change the scale."
components = ["SceneComponent", "PromptComponent"]

[step_102_scale_toggle]
dialogue = "Now toggle back to scale of 2. Which scale uses fewer symbols?"
components = ["PromptComponent"]

# --- Section: half_symbol_mastery ---
[section_102_half_symbol_mastery]
template = "chart_template"

[step_103_half_symbol_mastery]
dialogue = "You learned about half-symbols. If you made a graph using this key, which numbers would need a half-symbol? Select ALL that need half symbols."
components = ["SceneComponent", "PromptComponent"]

[step_104_half_symbol_mastery]
dialogue = "What does a half-symbol show?"
components = ["PromptComponent"]

# --- Section: metacognitive_reflection ---
[section_103_metacognitive_reflection]
template = "chart_template"

[step_105_metacognitive_reflection]
dialogue = "You've been working with \"scale of 2\" all lesson. Which of these describes what a \"scale\" on a graph means?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: closure ---
[section_104_closure]
template = "chart_template"

[step_106_closure]
dialogue = "You started by watching your data transform. Now you can CREATE scaled graphs yourself. You know that each symbol shows 2, and half-symbols show 1. You discovered something important: scaled graphs need fewer symbols. That makes them easier to read when numbers get big. Next time, you'll use a scale of 5. Instead of groups of 2, you'll group by 5s. You already know how to count by 5s, that will help!"
components = ["SceneComponent"]
