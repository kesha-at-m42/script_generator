# warmup-script.toml

title = "warmup"
type = "sequence"

# ---------------------------------------------------------------------------
# Section 1 - w1_data_collection
# ---------------------------------------------------------------------------

[section_101_w1_data_collection]
template = "chart_template"

[step_101_w1_data_collection]
dialogue = "The Minis need your help counting! Let's see what we find."
components = ["SceneComponent", "PromptComponent"]
prompt_text = "Count the items in each category and confirm your count."

[step_101.correct]
dialogue = "Nice counting! You found them all."
metadata = { sting_id = "on_correct" }

# ---------------------------------------------------------------------------
# Section 2 - w2_prediction
# ---------------------------------------------------------------------------

[section_102_w2_prediction]
template = "chart_template"

[step_102_w2_prediction]
dialogue = "You counted 8 Red Minis, 10 Blue Minis, and 6 Yellow Minis. That's your data. Let's make a picture graph with it. Here's something new though: what if each symbol showed 2 items instead of 1? You have 8 Red Minis. If you group them into 2s..."
components = ["PromptComponent"]
prompt_text = "How many groups of 2 can you make from 8?"

[step_102.correct]
dialogue = "You think 4 groups. Let's see if you're right..."
metadata = { sting_id = "on_correct" }

# skipped correct branch: 8

# skipped correct branch: 10

# skipped correct branch: 6

# ---------------------------------------------------------------------------
# Section 3 - w3_grouping_animation
# ---------------------------------------------------------------------------

[section_103_w3_grouping_animation]
template = "chart_template"

[step_103_w3_grouping_animation]
dialogue = "Here are the 8 Red Minis. Watch what happens... 8 items... watch them pair up into groups of 2... Each group of 2 becomes ONE symbol. 4 groups... 4 symbols. Each symbol shows 2 items, not 1. That's different from before! Let's transform the Blue Minis into symbols. 10 items... 5 groups of 2... 5 symbols. Now the Yellow Minis into symbols representing 2 each. 6 items... 3 groups of 2... 3 symbols. Your data is now a [vocab]scaled picture graph[/vocab]! Each symbol represents 2 instead of 1."

# ---------------------------------------------------------------------------
# Section 4 - w4_verification_bridge
# ---------------------------------------------------------------------------

[section_104_w4_verification_bridge]
template = "chart_template"

[step_104_w4_verification_bridge]
dialogue = "Now you've seen how grouping works. Each group of 2 became one symbol."
components = ["PromptComponent"]
prompt_text = "Look at Blue Minis. How many symbols do you see?"

[step_104.correct]
dialogue = "5 symbols. And each one shows 2 items. So that's 10 total! You can already read a [vocab]scaled[/vocab] graph. Now let's learn more about how they work."
metadata = { sting_id = "on_correct" }

[step_104.step_507]
dialogue = "Let's look at Blue Minis specifically. Count the symbols in just that row."
id = "3"

[step_104.step_508]
dialogue = "You're looking at the wrong row. Find Blue Minis and count those symbols."
id = "4"

[step_104.step_509]
dialogue = "The question asks about symbols, not total items. Count just the symbols in Blue Minis."
id = "10"

[step_104.step_510]
dialogue = "Let me show you. Look at the Blue Minis row. Count each symbol: 1, 2, 3, 4, 5. There are 5 symbols. You are beginning to read a [vocab]scaled[/vocab] graph. Let's learn more about how they work."
id = "medium"
