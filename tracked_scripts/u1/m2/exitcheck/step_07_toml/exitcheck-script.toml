# exitcheck-script.toml

title = "exitcheck"
type = "sequence"

# ---------------------------------------------------------------------------
# Section 1 - scale_meaning
# ---------------------------------------------------------------------------

[section_101_scale_meaning]
template = "chart_template"

[step_101_scale_meaning]
dialogue = "Here is data showing students' favorite sports. Look at the key. This graph has a scale of 2. What does \"scale of 2\" mean?"
components = ["SceneComponent", "PromptComponent"]
prompt_text = "What does “scale of 2” mean?"

[step_101.correct]
dialogue = "Scale of 2 means each symbol shows 2 votes."
metadata = { sting_id = "on_correct" }

[step_101.step_502]
dialogue = "Count the categories. There are actually 4 sports, not 2. The scale tells us something different."
id = "two_categories"

[step_101.step_503]
dialogue = "Scale isn't about adding. Look at the key: it tells us about the symbols. What does that mean?"
id = "add_2_find_total"

[step_101.step_504]
dialogue = "Look at each category. There are different numbers of symbols for each sport, but all show the same symbol. The key tells us about the scale for the symbols. What do you learn from the key?"
id = "two_symbols"

[step_101.step_505]
dialogue = "Let me show you how this works. The key says \"Each symbol = 2 votes.\" That means every symbol on this graph represents 2 votes, not 1. So if Soccer has 4 symbols, each is worth 2 votes: 2, 4, 6, 8. 8 total votes. Scale of 2 means each symbol shows 2 votes."
id = "heavy"

# ---------------------------------------------------------------------------
# Section 2 - symbol_calculation_odd
# ---------------------------------------------------------------------------

[section_102_symbol_calculation_odd]
template = "chart_template"

[step_102_symbol_calculation_odd]
dialogue = "This table shows us the stickers collected by 4 children. Emma collected 9 stickers. To make a picture graph, how many symbols does Emma need?"
components = ["PromptComponent"]
prompt_text = "How many symbols does Emma need?"

[step_102.correct]
dialogue = "4 and a half symbols. 9 is odd so 4 full symbols for 8, plus a half-symbol for 1 left."
metadata = { sting_id = "on_correct" }

[step_102.step_507]
dialogue = "4 symbols would show 8 stickers. But Emma has 9, that's 1 more than 8. What can we use to show just 1 sticker?"
id = "4"

[step_102.step_508]
dialogue = "Each symbol stands for 2 stickers. So 5 symbols would show 10 stickers total. Emma has 9. How many symbols for that?"
id = "5"

[step_102.step_509]
dialogue = "9 is how many stickers Emma has. But check the key. Each symbol stands for 2 stickers. How many symbols do we need to show 9?"
id = "9"

[step_102.step_510]
dialogue = "Let me show you how this works. Emma has 9 stickers which is an odd number. Each symbol stands for 2, so 4 full symbols show 2, 4, 6, 8 stickers. We need 1 more sticker to make 9, that's a half-symbol. So 4 and a half symbols total."
id = "heavy"

# ---------------------------------------------------------------------------
# Section 3 - create_half_symbol
# ---------------------------------------------------------------------------

[section_103_create_half_symbol]
template = "chart_template"

[step_103_create_half_symbol]
dialogue = "Place the symbols for Ava. She collected 7 stickers."
components = ["PromptComponent"]
prompt_text = "Place symbols for Ava."

[step_103.correct]
dialogue = "3 and a half symbols for 7 stickers. Each full symbol is 2, the half is 1."
metadata = { sting_id = "on_correct" }

[step_103.step_512]
dialogue = "Not quite. Check how many stickers Ava collected and what the scale tells you."
id = "light"

[step_103.step_513]
dialogue = "Try again. Ava has 7 stickers. Each key shows each symbol equals 2 stickers. How many full symbols do you need? Do you need any half symbols?"
id = "medium"

[step_103.step_514]
dialogue = "Let's think through this together. Each symbol represents 2 stickers. Ava collected 7 stickers which is an odd number and won't split perfectly into 2s. So we place 3 full symbols: that's 2, 4, 6 stickers. Then we add a half-symbol for the remaining 1 sticker. 3 and a half symbols total for 7 stickers."
id = "heavy"

# ---------------------------------------------------------------------------
# Section 4 - read_total_value
# ---------------------------------------------------------------------------

[section_104_read_total_value]
template = "chart_template"

[step_104_read_total_value]
dialogue = "Look at the completed graph showing how students from one class get to school. How many students take the bus to school?"
components = ["PromptComponent"]
prompt_text = "How many students take the bus to school?"

[step_104.correct]
dialogue = "8 students take the bus to school. 4 symbols, each worth 2."
metadata = { sting_id = "on_correct" }

[step_104.step_516]
dialogue = "You counted the symbols. But check the key. It tells us each symbol equals 2 students. So how many students take the bus?"
id = "4"

[step_104.step_517]
dialogue = "Look at the Bus row and the key. Each symbol equals 2 students. How many symbols are there in the Bus row? How many students does that equal taking the bus?"
id = "3"

[step_104.step_518]
dialogue = "Check the Bus row and count carefully. Each symbol shows 2 students so count by 2s along the Bus row."
id = "6"

[step_104.step_519]
dialogue = "Let me show you how this works. First, notice the key tells us each symbol is 2 students. Count by 2s along the symbols in the Bus row: 2, 4, 6, 8. So 8 students take the bus to school."
id = "heavy"

# ---------------------------------------------------------------------------
# Section 5 - s1_closure
# ---------------------------------------------------------------------------

[section_105_s1_closure]
template = "chart_template"

[step_105_s1_closure]
dialogue = "You are connecting the scale to picture graphs. Let's practice."
