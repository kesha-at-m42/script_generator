title = "synthesis"
type = "sequence"

# --- Section: opening_frame ---
[section_100_opening_frame]
template = "PLACEHOLDER"

[step_100_opening_frame]
dialogue = "You practiced equations with 2s, 5s, and 10s. Let's connect what you've learned."
components = ["SceneComponent"]

# --- Section: graph_scale_connection_type_c ---
[section_101_graph_scale_connection_type_c]
template = "PLACEHOLDER"

[step_101_graph_scale_connection_type_c]
dialogue = "You've been reading graphs. Here's a scale of 2. 3 symbols, 3 groups of 2, that's 3 times 2 equals 6."
components = ["SceneComponent"]

[step_102_graph_scale_connection_type_c]
dialogue = "Same graph shape, but scale of 5. Same 3 symbols, but now 3 groups of 5, that's 3 times 5 equals 15."

[step_103_graph_scale_connection_type_c]
dialogue = "And scale of 10. 3 groups of 10 is 3 times 10 equals 30."

[step_104_graph_scale_connection_type_c]
dialogue = "Look what happened. Same graph. Same number of symbols. But when we changed the scale, the multiplication changed. The product got bigger. That's because we were multiplying by bigger numbers."

# --- Section: pattern_summary_as_checking_toolkit ---
[section_102_pattern_summary_as_checking_toolkit]
template = "PLACEHOLDER"

[step_105_pattern_summary_as_checking_toolkit]
dialogue = "Here are all three patterns together. 2s are always even. 5s end in 0 or 5. 10s end in 0. These patterns aren't just facts. They're how you check your work."
components = ["SceneComponent"]

[step_106_pattern_summary_as_checking_toolkit]
dialogue = "Say you see this question: what is 8 times 5? And you have these choices."
components = ["PromptComponent"]

# --- Section: strategy_comparison_type_b_progressive ---
[section_103_strategy_comparison_type_b_progressive]
template = "PLACEHOLDER"

[step_107_strategy_comparison_type_b_progressive]
dialogue = "Three ways to find 6 times 5 equals 30. You can look at the groups and count. You can skip-count: 5, 10, 15, 20, 25, 30. Or you can add: 5 plus 5 plus 5 plus 5 plus 5 plus 5 equals 30. Same answer. All three work. Which way made more sense to you today?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: generalization_what_patterns_tell_you ---
[section_104_generalization_what_patterns_tell_you]
template = "PLACEHOLDER"

[step_108_generalization_what_patterns_tell_you]
dialogue = "Before you even skip-count, just looking at 7 times 2, what do you know about the answer?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: metacognitive_reflection ---
[section_105_metacognitive_reflection]
template = "PLACEHOLDER"

[step_109_metacognitive_reflection]
dialogue = "You just practiced comparing data on bar graphs. You read the bars, found their heights, and compared the values. That's how you use bar graphs to answer questions about data."
components = ["SceneComponent"]

# --- Section: metacognitive_reflection ---
[section_106_metacognitive_reflection]
template = "PLACEHOLDER"

[step_110_metacognitive_reflection]
dialogue = "If you remember one thing from today, what would it be?"
components = ["SceneComponent", "PromptComponent"]

# --- Section: identity_building_closure ---
[section_107_identity_building_closure]
template = "PLACEHOLDER"

[step_111_identity_building_closure]
dialogue = "You can compute products for 2s, 5s, and 10s. You know the patterns. You can build complete equations with factors and products."
components = ["SceneComponent"]

[step_112_identity_building_closure]
dialogue = "Next time, you'll see equations where one of the factors is missing. Like something times 5 equals 30. You'll figure out what's hiding. You're ready because you already know what these equations mean."
