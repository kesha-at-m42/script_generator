# --- Section: 10s_discovery_computation_application_new ---
[section_107_10s_discovery_computation_application_new]
template = "PLACEHOLDER"

[step_126_10s_discovery_computation_application_new]
dialogue = "One more family. 10s. Here are the multiples of 10: 10, 20, 30, 40, 50... all the way to 100. See the pattern?"
components = ["SceneComponent"]

[step_127_10s_discovery_computation_application_new]
dialogue = "The products ALL end in zero."

[step_128_10s_discovery_computation_application_new]
dialogue = "See the factor multiplied by 10 with the product? Multiplying by 10 just puts a zero at the end of the other factor. 4 times 10? 4 with a zero. 40."

[step_129_10s_discovery_computation_application_new]
dialogue = "Build the equation for 7 times 10."
components = ["PromptComponent"]

